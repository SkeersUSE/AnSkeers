<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Liquid Focus — таймер в стиле iOS 26</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 20% 30%, #1a2a3a, #0a0f1a);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif;
            padding: 20px;
        }

        /* Liquid Glass эффект 1:1 iOS 26 */
        .glass-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(40px) saturate(180%);
            -webkit-backdrop-filter: blur(40px) saturate(180%);
            border-radius: 64px;
            border: 0.5px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            transition: all 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        .container {
            width: 360px;
            padding: 32px 24px 40px;
            text-align: center;
        }

        h1 {
            font-size: 28px;
            font-weight: 590;
            background: linear-gradient(135deg, #fff, #aaa);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
            margin-bottom: 28px;
        }

        .timer-display {
            font-size: 72px;
            font-weight: 590;
            font-feature-settings: "tnum";
            font-variant-numeric: tabular-nums;
            color: white;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
            margin: 20px 0;
            letter-spacing: 2px;
        }

        .mode-buttons {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 32px;
        }

        .mode-btn {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(20px);
            border: 0.5px solid rgba(255,255,255,0.25);
            padding: 8px 18px;
            border-radius: 60px;
            font-size: 16px;
            font-weight: 500;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }

        .mode-btn.active {
            background: rgba(255,255,255,0.35);
            border-color: rgba(255,255,255,0.7);
            box-shadow: 0 0 12px rgba(255,255,255,0.3);
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-bottom: 40px;
        }

        .ctrl-btn {
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(40px);
            border: none;
            width: 64px;
            height: 64px;
            border-radius: 64px;
            font-size: 28px;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 6px 12px rgba(0,0,0,0.2);
        }

        .ctrl-btn:active {
            transform: scale(0.94);
            background: rgba(255,255,255,0.4);
        }

        .donate {
            background: rgba(255,255,255,0.12);
            border-radius: 48px;
            padding: 12px;
            margin-top: 16px;
            font-size: 15px;
            color: #ddd;
            text-decoration: none;
            display: inline-block;
            width: 100%;
        }

        .ads-space {
            margin-top: 24px;
            font-size: 11px;
            color: rgba(255,255,255,0.4);
            text-align: center;
            border-top: 0.5px solid rgba(255,255,255,0.15);
            padding-top: 20px;
        }

        footer {
            font-size: 10px;
            color: rgba(255,255,255,0.3);
            margin-top: 20px;
        }
    </style>
</head>
<body>
<div class="glass-card container">
    <h1>Liquid Focus</h1>
    <div class="timer-display" id="timer">25:00</div>

    <div class="mode-buttons">
        <div class="mode-btn active" data-minutes="25">🍅 Pomodoro</div>
        <div class="mode-btn" data-minutes="5">☕️ Break</div>
        <div class="mode-btn" data-minutes="15">🧠 Long break</div>
    </div>

    <div class="controls">
        <button class="ctrl-btn" id="startPause">▶️</button>
        <button class="ctrl-btn" id="reset">🔄</button>
    </div>

    <a href="https://www.donationalerts.com/r/ваша_ссылка" target="_blank" class="donate">
        ☕️ Поддержать проект (donate)
    </a>

    <div class="ads-space">
        <!-- Место для Google AdSense или Яндекс.Рекламы -->
        <div id="adSensePlaceholder" style="min-height: 90px;">
            ⚡️ Реклама будет здесь
        </div>
    </div>
    <footer>iOS 26 Liquid Glass • концентрация без границ</footer>
</div>

<script>
    // ----- Таймер с точным стилем iOS 26 -----
    let timeLeft = 25 * 60; // секунд
    let timerId = null;
    let isRunning = false;
    let currentMode = 25; // minutes

    const timerEl = document.getElementById('timer');
    const startPauseBtn = document.getElementById('startPause');
    const resetBtn = document.getElementById('reset');
    const modeBtns = document.querySelectorAll('.mode-btn');

    function updateDisplay() {
        const mins = Math.floor(timeLeft / 60);
        const secs = timeLeft % 60;
        timerEl.textContent = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
    }

    function setMode(minutes) {
        if (isRunning) {
            clearInterval(timerId);
            isRunning = false;
            startPauseBtn.textContent = '▶️';
        }
        currentMode = minutes;
        timeLeft = minutes * 60;
        updateDisplay();
    }

    function startTimer() {
        if (timerId) clearInterval(timerId);
        isRunning = true;
        startPauseBtn.textContent = '⏸️';
        timerId = setInterval(() => {
            if (timeLeft <= 1) {
                // таймер закончился
                clearInterval(timerId);
                isRunning = false;
                startPauseBtn.textContent = '▶️';
                timeLeft = 0;
                updateDisplay();
                // легкий звуковой сигнал (beep через Web Audio, но без разрешения — вибрация)
                if ('vibrate' in navigator) navigator.vibrate(200);
                alert('Время вышло! 🧘');
                setMode(currentMode);
            } else {
                timeLeft--;
                updateDisplay();
            }
        }, 1000);
    }

    function pauseTimer() {
        if (timerId) {
            clearInterval(timerId);
            timerId = null;
        }
        isRunning = false;
        startPauseBtn.textContent = '▶️';
    }

    function resetTimer() {
        if (isRunning) {
            clearInterval(timerId);
            isRunning = false;
            startPauseBtn.textContent = '▶️';
        }
        timeLeft = currentMode * 60;
        updateDisplay();
    }

    // обработчики
    startPauseBtn.addEventListener('click', () => {
        if (isRunning) {
            pauseTimer();
        } else {
            startTimer();
        }
    });

    resetBtn.addEventListener('click', resetTimer);

    modeBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            modeBtns.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            const minutes = parseInt(btn.dataset.minutes, 10);
            setMode(minutes);
        });
    });

    // инициализация
    setMode(25);
    updateDisplay();

    // подсказка: если нужно вставить код активации премиум (но у вас нет premium, просто демо)
    window.addPremiumCode = function(code) {
        console.log('Premium код получен (демо):', code);
        alert('✨ Демо-режим: премиум функция не реализована, но код принят: ' + code);
    };
</script>
</body>
</html>
