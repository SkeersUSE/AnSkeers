<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Мэр Мегаполиса — Симулятор города</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, 'SF Pro Display', 'Segoe UI', Helvetica, sans-serif;
            background: #000000;
            min-height: 100vh;
            color: #ffffff;
            transition: background 0.3s;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
            padding: 20px;
        }

        /* iOS Glass стиль */
        .glass-card {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 32px;
            border: 1px solid rgba(255, 255, 255, 0.25);
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        .glass-card:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: scale(1.01);
        }

        h1 {
            text-align: center;
            padding: 20px;
            font-size: 1.8em;
            font-weight: 600;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-radius: 55px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            margin-bottom: 20px;
            color: #ffffff;
        }

        /* Панель ресурсов */
        .resources-panel {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .resource-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-radius: 28px;
            padding: 15px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .resource-icon {
            font-size: 1.8em;
            margin-bottom: 5px;
        }

        .resource-value {
            font-size: 1.5em;
            font-weight: bold;
            color: #ffd700;
        }

        .resource-label {
            font-size: 0.7em;
            opacity: 0.7;
            margin-top: 5px;
        }

        /* Секции */
        .section-title {
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: rgba(255, 255, 255, 0.7);
            margin: 20px 0 12px 8px;
        }

        /* Строительство */
        .buildings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 12px;
            margin-bottom: 20px;
        }

        .building-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid rgba(255, 255, 255, 0.2);
            position: relative;
        }

        .building-card:hover {
            background: rgba(255, 255, 255, 0.12);
            transform: scale(1.02);
        }

        .building-icon {
            font-size: 2.2em;
            margin-bottom: 8px;
        }

        .building-name {
            font-size: 0.85em;
            font-weight: 500;
        }

        .building-stats {
            font-size: 0.65em;
            opacity: 0.7;
            margin-top: 5px;
        }

        .building-price {
            color: #ffd700;
            font-size: 0.7em;
            margin-top: 8px;
        }

        .building-count {
            position: absolute;
            top: 5px;
            right: 8px;
            font-size: 0.7em;
            background: rgba(0,0,0,0.5);
            padding: 2px 6px;
            border-radius: 20px;
        }

        /* Кнопки */
        .action-btn {
            background: rgba(255, 215, 0, 0.2);
            border: 1px solid rgba(255, 215, 0, 0.5);
            padding: 12px 20px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 0.9em;
            color: #ffd700;
            width: 100%;
            transition: all 0.2s;
            margin-top: 10px;
        }

        .action-btn:hover {
            background: rgba(255, 215, 0, 0.35);
            transform: scale(1.02);
        }

        .danger-btn {
            background: rgba(255, 85, 85, 0.2);
            border-color: rgba(255, 85, 85, 0.5);
            color: #ff6b6b;
        }

        /* Прогресс-бар счастья */
        .happiness-bar {
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            height: 8px;
            overflow: hidden;
            margin: 10px 0;
        }

        .happiness-fill {
            background: linear-gradient(90deg, #ff6b6b, #ffd700, #4ecdc4);
            width: 100%;
            height: 100%;
            transition: width 0.3s;
        }

        /* Достижения */
        .achievements-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 10px;
        }

        .achievement-item {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 10px 15px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .achievement-icon {
            font-size: 1.5em;
        }

        .achievement-info {
            flex: 1;
        }

        .achievement-name {
            font-size: 0.8em;
            font-weight: 500;
        }

        .achievement-desc {
            font-size: 0.65em;
            opacity: 0.6;
        }

        .achievement-completed {
            opacity: 0.5;
        }

        .achievement-completed .achievement-icon {
            filter: grayscale(1);
        }

        /* Кнопка сброса */
        .reset-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 8px 16px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.7em;
            color: rgba(255, 255, 255, 0.6);
            margin-top: 20px;
            width: 100%;
        }

        .reset-btn:hover {
            background: rgba(255, 85, 85, 0.2);
            border-color: rgba(255, 85, 85, 0.5);
            color: #ff6b6b;
        }

        .footer {
            text-align: center;
            padding: 20px;
            font-size: 0.7em;
            opacity: 0.5;
            margin-top: 20px;
        }

        @media (max-width: 550px) {
            .resources-panel {
                grid-template-columns: repeat(3, 1fr);
                gap: 8px;
            }
            .resource-value {
                font-size: 1.2em;
            }
            .buildings-grid {
                grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🏙️ Мэр Мегаполиса</h1>

    <!-- Панель ресурсов -->
    <div class="resources-panel">
        <div class="resource-card">
            <div class="resource-icon">💰</div>
            <div class="resource-value" id="money">0</div>
            <div class="resource-label">БЮДЖЕТ</div>
        </div>
        <div class="resource-card">
            <div class="resource-icon">👥</div>
            <div class="resource-value" id="population">0</div>
            <div class="resource-label">НАСЕЛЕНИЕ</div>
        </div>
        <div class="resource-card">
            <div class="resource-icon">😊</div>
            <div class="resource-value" id="happiness">50</div>
            <div class="resource-label">СЧАСТЬЕ %</div>
            <div class="happiness-bar"><div class="happiness-fill" id="happinessFill" style="width:50%"></div></div>
        </div>
    </div>

    <!-- Строительство -->
    <div class="section-title">🏗️ СТРОИТЕЛЬСТВО</div>
    <div class="buildings-grid" id="buildingsGrid"></div>

    <!-- Дополнительные действия -->
    <button class="action-btn" id="collectTaxBtn">💰 СОБРАТЬ НАЛОГИ (x1.5 дохода)</button>
    <button class="action-btn" id="festivalBtn">🎉 УСТРОИТЬ ФЕСТИВАЛЬ (500💰 → +15% счастья)</button>

    <!-- Достижения -->
    <div class="section-title">🏆 ДОСТИЖЕНИЯ</div>
    <div id="achievementsList" class="achievements-list"></div>

    <!-- Сброс -->
    <button class="reset-btn" id="resetBtn">🔄 СБРОСИТЬ ПРОГРЕСС</button>

    <div class="footer">Управляй городом | Строй здания | Повышай счастье жителей</div>
</div>

<script>
    // === ИГРОВЫЕ ДАННЫЕ ===
    let gameData = {
        money: 1000,
        population: 0,
        happiness: 50,
        buildings: {
            house: 0,
            commercial: 0,
            factory: 0,
            park: 0,
            school: 0
        },
        achievements: [],
        lastTaxTime: Date.now()
    };

    // Конфигурация зданий
    const buildings = {
        house: { name: "Жилой дом", icon: "🏠", price: 200, income: 5, happiness: 0, population: 10, desc: "+10 жителей" },
        commercial: { name: "Торговый центр", icon: "🏬", price: 500, income: 25, happiness: 2, population: 5, desc: "+25💰/сек" },
        factory: { name: "Завод", icon: "🏭", price: 800, income: 50, happiness: -5, population: 3, desc: "-5% счастья" },
        park: { name: "Парк", icon: "🌳", price: 300, income: 0, happiness: 5, population: 0, desc: "+5% счастья" },
        school: { name: "Школа", icon: "🏫", price: 600, income: 0, happiness: 8, population: 0, desc: "+8% счастья" }
    };

    // Достижения
    const achievementsList = [
        { id: "pop100", name: "🌆 Первый район", desc: "Достигните 100 жителей", requirement: "population", target: 100, reward: 500 },
        { id: "pop500", name: "🏙️ Маленький город", desc: "Достигните 500 жителей", requirement: "population", target: 500, reward: 2000 },
        { id: "pop2000", name: "🌃 Мегаполис", desc: "Достигните 2000 жителей", requirement: "population", target: 2000, reward: 10000 },
        { id: "money10000", name: "💰 Богатый мэр", desc: "Накопите 10000 монет", requirement: "money", target: 10000, reward: 5000 },
        { id: "happiness90", name: "😊 Счастливый город", desc: "Достигните 90% счастья", requirement: "happiness", target: 90, reward: 3000 },
        { id: "builder10", name: "🏗️ Строитель", desc: "Постройте 10 зданий", requirement: "totalBuildings", target: 10, reward: 1000 }
    ];

    // === ЗАГРУЗКА / СОХРАНЕНИЕ ===
    function loadGame() {
        const saved = localStorage.getItem('mayorGame');
        if (saved) {
            try {
                const loaded = JSON.parse(saved);
                gameData = { ...gameData, ...loaded };
                if (!gameData.achievements) gameData.achievements = [];
                if (!gameData.lastTaxTime) gameData.lastTaxTime = Date.now();
            } catch(e) {}
        }
        updateUI();
        startIncomeLoop();
    }

    function saveGame() {
        localStorage.setItem('mayorGame', JSON.stringify(gameData));
    }

    // === ПОДСЧЁТ ДОХОДА ===
    function calculateIncome() {
        let income = 0;
        income += gameData.buildings.house * buildings.house.income;
        income += gameData.buildings.commercial * buildings.commercial.income;
        income += gameData.buildings.factory * buildings.factory.income;
        return income;
    }

    function getHappinessBonus() {
        // Счастье влияет на доход (от 0.5x до 1.5x)
        return 0.5 + (gameData.happiness / 100);
    }

    // === ПОСТРОЙКА ЗДАНИЯ ===
    function buyBuilding(type) {
        const building = buildings[type];
        if (gameData.money >= building.price) {
            gameData.money -= building.price;
            gameData.buildings[type]++;
            
            // Изменение населения
            gameData.population += building.population;
            
            // Изменение счастья
            gameData.happiness += building.happiness;
            gameData.happiness = Math.min(100, Math.max(0, gameData.happiness));
            
            updateUI();
            saveGame();
            checkAchievements();
        } else {
            showNotif("❌ Недостаточно денег!");
        }
    }

    // === СБОР НАЛОГОВ ===
    function collectTax() {
        const income = calculateIncome();
        const bonus = getHappinessBonus();
        const taxAmount = Math.floor(income * bonus * 1.5);
        gameData.money += taxAmount;
        gameData.lastTaxTime = Date.now();
        updateUI();
        saveGame();
        showNotif(`💰 Собрано налогов: ${taxAmount} монет!`);
        checkAchievements();
    }

    // === ФЕСТИВАЛЬ ===
    function festival() {
        if (gameData.money >= 500) {
            gameData.money -= 500;
            gameData.happiness = Math.min(100, gameData.happiness + 15);
            updateUI();
            saveGame();
            showNotif("🎉 Фестиваль прошёл успешно! +15% счастья!");
            checkAchievements();
        } else {
            showNotif("❌ Не хватает 500 монет на фестиваль!");
        }
    }

    // === ПРОВЕРКА ДОСТИЖЕНИЙ ===
    function checkAchievements() {
        let newAchievements = [];
        
        achievementsList.forEach(ach => {
            if (gameData.achievements.includes(ach.id)) return;
            
            let completed = false;
            if (ach.requirement === "population" && gameData.population >= ach.target) completed = true;
            if (ach.requirement === "money" && gameData.money >= ach.target) completed = true;
            if (ach.requirement === "happiness" && gameData.happiness >= ach.target) completed = true;
            if (ach.requirement === "totalBuildings") {
                const total = Object.values(gameData.buildings).reduce((a,b) => a + b, 0);
                if (total >= ach.target) completed = true;
            }
            
            if (completed) {
                gameData.achievements.push(ach.id);
                gameData.money += ach.reward;
                newAchievements.push(ach);
                showNotif(`🏆 Достижение: ${ach.name}! +${ach.reward}💰`);
            }
        });
        
        if (newAchievements.length > 0) {
            updateUI();
            saveGame();
        }
    }

    // === ОБНОВЛЕНИЕ UI ===
    function updateUI() {
        document.getElementById('money').innerText = Math.floor(gameData.money);
        document.getElementById('population').innerText = gameData.population;
        document.getElementById('happiness').innerText = gameData.happiness;
        document.getElementById('happinessFill').style.width = gameData.happiness + '%';
        
        // Обновление цвета счастья
        const fill = document.getElementById('happinessFill');
        if (gameData.happiness < 30) fill.style.background = '#ff6b6b';
        else if (gameData.happiness < 70) fill.style.background = '#ffd700';
        else fill.style.background = '#4ecdc4';
        
        // Обновление списка зданий
        const grid = document.getElementById('buildingsGrid');
        grid.innerHTML = '';
        for (const [type, building] of Object.entries(buildings)) {
            const count = gameData.buildings[type];
            grid.innerHTML += `
                <div class="building-card" onclick="buyBuilding('${type}')">
                    <div class="building-icon">${building.icon}</div>
                    <div class="building-name">${building.name}</div>
                    <div class="building-stats">${building.desc}</div>
                    <div class="building-price">💰 ${building.price}</div>
                    <div class="building-count">${count}</div>
                </div>
            `;
        }
        
        // Обновление достижений
        const achievementsContainer = document.getElementById('achievementsList');
        achievementsContainer.innerHTML = '';
        achievementsList.forEach(ach => {
            const completed = gameData.achievements.includes(ach.id);
            achievementsContainer.innerHTML += `
                <div class="achievement-item ${completed ? 'achievement-completed' : ''}">
                    <div class="achievement-icon">${completed ? '✅' : '🔒'}</div>
                    <div class="achievement-info">
                        <div class="achievement-name">${ach.name}</div>
                        <div class="achievement-desc">${ach.desc} | Награда: ${ach.reward}💰</div>
                    </div>
                </div>
            `;
        });
    }

    // === ЦИКЛ ДОХОДА ===
    let incomeInterval;
    function startIncomeLoop() {
        if (incomeInterval) clearInterval(incomeInterval);
        incomeInterval = setInterval(() => {
            const income = calculateIncome();
            const bonus = getHappinessBonus();
            const earnings = Math.floor(income * bonus);
            if (earnings > 0) {
                gameData.money += earnings;
                updateUI();
                saveGame();
            }
        }, 5000);
    }

    // === СБРОС ПРОГРЕССА ===
    function resetGame() {
        if (confirm("⚠️ Ты уверен? Весь прогресс будет сброшен!")) {
            localStorage.removeItem('mayorGame');
            location.reload();
        }
    }

    // === УВЕДОМЛЕНИЯ ===
    function showNotif(msg, dur = 2000) {
        const n = document.createElement('div');
        n.innerText = msg;
        n.style.cssText = 'position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(255,255,255,0.9);color:#000;padding:10px 20px;border-radius:40px;z-index:1001;animation:fadeOut 2s forwards;font-weight:bold;';
        document.body.appendChild(n);
        setTimeout(() => n.remove(), dur);
    }

    // Стиль для уведомлений
    const style = document.createElement('style');
    style.textContent = `
        @keyframes fadeOut {
            0% { opacity: 1; transform: translateX(-50%) scale(1); }
            70% { opacity: 1; transform: translateX(-50%) scale(1); }
            100% { opacity: 0; transform: translateX(-50%) scale(0.9); visibility: hidden; }
        }
    `;
    document.head.appendChild(style);

    // === КНОПКИ ===
    document.getElementById('collectTaxBtn').onclick = collectTax;
    document.getElementById('festivalBtn').onclick = festival;
    document.getElementById('resetBtn').onclick = resetGame;

    // === ЗАПУСК ===
    loadGame();
    window.buyBuilding = buyBuilding;
    window.collectTax = collectTax;
    window.festival = festival;
    window.resetGame = resetGame;
</script>
</body>
</html>
