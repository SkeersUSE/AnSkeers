<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Liquid Snap — анонимные вопросы</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 30% 10%, #1a1a2e, #0a0a15, #05050a);
            font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif;
            padding: 20px;
        }

        .glass {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(40px) saturate(180%);
            -webkit-backdrop-filter: blur(40px) saturate(180%);
            border: 0.5px solid rgba(255, 255, 255, 0.2);
            border-radius: 48px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2), inset 0 1px 0 rgba(255, 255, 255, 0.08);
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
        }

        .profile-header {
            text-align: center;
            padding: 32px 20px;
            margin-bottom: 20px;
        }

        .avatar {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #ff6b6b, #4ecdc4);
            border-radius: 50%;
            margin: 0 auto 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .username {
            font-size: 28px;
            font-weight: 600;
            color: white;
            margin-bottom: 8px;
        }

        .bio {
            color: rgba(255,255,255,0.6);
            font-size: 14px;
        }

        .edit-bio {
            margin-top: 12px;
            background: rgba(255,255,255,0.1);
            border: none;
            padding: 6px 16px;
            border-radius: 40px;
            color: rgba(255,255,255,0.6);
            font-size: 12px;
            cursor: pointer;
        }

        .link-box {
            margin-top: 16px;
            background: rgba(255,255,255,0.1);
            padding: 12px;
            border-radius: 60px;
            display: flex;
            gap: 8px;
        }

        .link-box input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            font-size: 14px;
            padding: 0 12px;
            outline: none;
        }

        .copy-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            font-weight: 500;
        }

        .question-card {
            padding: 24px;
            margin-bottom: 16px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .question-card:active {
            transform: scale(0.98);
        }

        .question-text {
            color: white;
            font-size: 17px;
            line-height: 1.4;
            margin-bottom: 12px;
        }

        .question-meta {
            display: flex;
            justify-content: space-between;
            color: rgba(255,255,255,0.4);
            font-size: 12px;
        }

        .answer-area {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 0.5px solid rgba(255,255,255,0.1);
            display: none;
        }

        .answer-area.show {
            display: block;
        }

        .answer-input {
            width: 100%;
            background: rgba(255,255,255,0.1);
            border: 0.5px solid rgba(255,255,255,0.2);
            border-radius: 28px;
            padding: 12px 16px;
            color: white;
            font-size: 14px;
            resize: none;
            font-family: inherit;
            outline: none;
        }

        .answer-btn {
            margin-top: 12px;
            background: rgba(255,255,255,0.2);
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            width: 100%;
        }

        .ask-form {
            padding: 24px;
            margin-top: 20px;
            margin-bottom: 20px;
        }

        .ask-form textarea {
            width: 100%;
            background: rgba(255,255,255,0.08);
            border: 0.5px solid rgba(255,255,255,0.2);
            border-radius: 28px;
            padding: 16px;
            color: white;
            font-size: 16px;
            resize: none;
            font-family: inherit;
            outline: none;
        }

        .send-btn {
            margin-top: 16px;
            background: linear-gradient(135deg, rgba(255,255,255,0.3), rgba(255,255,255,0.1));
            border: 0.5px solid rgba(255,255,255,0.3);
            padding: 14px;
            border-radius: 60px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
        }

        .empty-state {
            text-align: center;
            padding: 48px 24px;
            color: rgba(255,255,255,0.4);
        }

        .owner-badge {
            background: rgba(255,255,255,0.1);
            padding: 8px 16px;
            border-radius: 60px;
            font-size: 12px;
            color: #4ecdc4;
            display: inline-block;
            margin-top: 12px;
        }

        .donate-btn {
            display: block;
            text-align: center;
            padding: 14px;
            margin: 20px 0;
            background: rgba(255,215,0,0.15);
            border: 0.5px solid rgba(255,215,0,0.3);
            border-radius: 60px;
            color: #ffd966;
            text-decoration: none;
            font-weight: 500;
        }

        .ads-space {
            margin-top: 20px;
            padding: 16px;
            text-align: center;
            font-size: 10px;
            color: rgba(255,255,255,0.3);
            border-top: 0.5px solid rgba(255,255,255,0.1);
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(20px);
            padding: 12px 24px;
            border-radius: 60px;
            color: white;
            font-size: 14px;
            z-index: 1000;
            display: none;
        }
    </style>
</head>
<body>
<div class="container" id="app"></div>
<div id="toast" class="toast"></div>

<script>
    // ========== ГЛОБАЛЬНЫЕ ДАННЫЕ ==========
    // Хранилище всех пользователей (в реальном проекте — база данных)
    // В демо-версии используем localStorage с ключом 'liquid_snap_all_users'
    let allUsers = {};

    // Текущий пользователь, чей профиль открыт
    let currentProfileId = null;
    // Является ли текущий пользователь владельцем профиля?
    let isOwner = false;

    // ========== ЗАГРУЗКА/СОХРАНЕНИЕ ==========
    function loadAllUsers() {
        const saved = localStorage.getItem('liquid_snap_all_users');
        if (saved) {
            allUsers = JSON.parse(saved);
        } else {
            // Стартовые пользователи для примера
            allUsers = {
                'alex': {
                    username: 'alex',
                    avatar: '🏄',
                    bio: 'спрашивай что угодно!',
                    questions: []
                },
                'lisa': {
                    username: 'lisa',
                    avatar: '🎨',
                    bio: 'арт-блогер ✨',
                    questions: []
                },
                'max': {
                    username: 'max',
                    avatar: '🎮',
                    bio: 'геймер и стример',
                    questions: []
                }
            };
        }
    }

    function saveAllUsers() {
        localStorage.setItem('liquid_snap_all_users', JSON.stringify(allUsers));
    }

    // ========== РАБОТА С ПРОФИЛЕМ ==========
    function getProfileIdFromURL() {
        // Поддерживаем форматы: #alex или ?user=alex
        let hash = window.location.hash.substring(1);
        if (hash) return hash;
        
        const params = new URLSearchParams(window.location.search);
        if (params.has('user')) return params.get('user');
        
        return null;
    }

    function getOrCreateMyProfile() {
        // Свой профиль (если захочешь создать свой)
        let myId = localStorage.getItem('my_liquid_id');
        if (myId && allUsers[myId]) return myId;
        
        // Создаём новый профиль
        myId = 'user_' + Math.random().toString(36).substr(2, 6);
        allUsers[myId] = {
            username: myId,
            avatar: '😎',
            bio: 'задавай вопросы анонимно',
            questions: []
        };
        localStorage.setItem('my_liquid_id', myId);
        saveAllUsers();
        return myId;
    }

    function updateProfile(updates) {
        if (!currentProfileId) return;
        if (!allUsers[currentProfileId]) allUsers[currentProfileId] = {
            username: currentProfileId,
            avatar: '😎',
            bio: '',
            questions: []
        };
        Object.assign(allUsers[currentProfileId], updates);
        saveAllUsers();
        render();
    }

    // ========== ВОПРОСЫ ==========
    function addQuestion(profileId, questionText) {
        if (!allUsers[profileId]) {
            showToast('профиль не найден');
            return false;
        }
        allUsers[profileId].questions = allUsers[profileId].questions || [];
        allUsers[profileId].questions.unshift({
            id: Date.now(),
            text: questionText,
            answered: false,
            answer: '',
            timestamp: new Date().toISOString()
        });
        saveAllUsers();
        return true;
    }

    function addAnswer(profileId, questionIndex, answerText) {
        if (!allUsers[profileId]) return false;
        const q = allUsers[profileId].questions[questionIndex];
        if (q) {
            q.answer = answerText;
            q.answered = true;
            saveAllUsers();
            return true;
        }
        return false;
    }

    // ========== ОТРИСОВКА ==========
    function render() {
        const app = document.getElementById('app');
        if (!currentProfileId || !allUsers[currentProfileId]) {
            app.innerHTML = `<div class="glass empty-state">👤 профиль не найден</div>`;
            return;
        }
        
        const profile = allUsers[currentProfileId];
        const questions = profile.questions || [];
        
        let questionsHtml = '';
        if (questions.length === 0) {
            questionsHtml = `<div class="glass empty-state">🤫 пока нет вопросов<br>будь первым!</div>`;
        } else {
            questionsHtml = questions.map((q, idx) => `
                <div class="glass question-card" onclick="toggleAnswer(${idx})">
                    <div class="question-text">${escapeHtml(q.text)}</div>
                    <div class="question-meta">
                        <span>📨 анонимно</span>
                        <span>${q.answered ? '✅ есть ответ' : '⏳ ждёт ответа'}</span>
                    </div>
                    <div class="answer-area" id="answerArea-${idx}">
                        ${q.answered ? `
                            <div style="background:rgba(255,255,255,0.05); border-radius:24px; padding:12px; margin-bottom:12px; color:#aaa;">
                                💬 ${escapeHtml(q.answer)}
                            </div>
                        ` : (isOwner ? `
                            <textarea class="answer-input" id="answerText-${idx}" rows="2" placeholder="написать ответ..."></textarea>
                            <button class="answer-btn" onclick="event.stopPropagation(); submitAnswer(${idx})">✏️ Ответить</button>
                        ` : `
                            <div style="color:rgba(255,255,255,0.3); text-align:center; padding:12px;">
                                ⏳ владелец скоро ответит
                            </div>
                        `)}
                    </div>
                </div>
            `).join('');
        }
        
        const ownerBadge = isOwner ? `<div class="owner-badge">🔒 это ваш профиль — вы можете отвечать</div>` : '';
        
        const askFormHtml = !isOwner ? `
            <div class="glass ask-form">
                <textarea id="questionInput" rows="3" placeholder="Спросить ${profile.username} анонимно..."></textarea>
                <button class="send-btn" onclick="sendQuestion()">📩 Отправить анонимно</button>
            </div>
        ` : '';
        
        app.innerHTML = `
            <div class="glass profile-header">
                <div class="avatar">${profile.avatar || '🍃'}</div>
                <div class="username">${escapeHtml(profile.username)}</div>
                <div class="bio">${escapeHtml(profile.bio || 'спрашивай что угодно ✨')}</div>
                ${isOwner ? `<button class="edit-bio" onclick="editBio()">✏️ изменить описание</button>` : ''}
                ${ownerBadge}
                <div class="link-box">
                    <input type="text" id="profileLink" readonly value="${window.location.href.split('#')[0]}#${currentProfileId}">
                    <button class="copy-btn" onclick="copyLink()">Копировать</button>
                </div>
            </div>
            <div id="questionsList">${questionsHtml}</div>
            ${askFormHtml}
            <a href="https://www.donationalerts.com/r/ваша_ссылка" target="_blank" class="donate-btn">
                ☕️ Поддержать проект
            </a>
            <div class="ads-space">
                <div style="min-height: 90px;">📱 реклама будет здесь</div>
                <div style="margin-top: 8px;">Liquid Snap • iOS 26 Liquid Glass</div>
            </div>
        `;
        
        // Обновляем ссылку в поле ввода
        const linkInput = document.getElementById('profileLink');
        if (linkInput) linkInput.value = window.location.href.split('#')[0] + '#' + currentProfileId;
    }
    
    // Глобальные функции для onclick
    window.toggleAnswer = function(idx) {
        const area = document.getElementById(`answerArea-${idx}`);
        if (area) area.classList.toggle('show');
    };
    
    window.submitAnswer = function(idx) {
        const input = document.getElementById(`answerText-${idx}`);
        const answer = input.value.trim();
        if (!answer) {
            showToast('напиши ответ 😌');
            return;
        }
        addAnswer(currentProfileId, idx, answer);
        showToast('ответ опубликован!');
        render();
    };
    
    window.sendQuestion = function() {
        const input = document.getElementById('questionInput');
        const text = input.value.trim();
        if (!text) {
            showToast('напиши вопрос ✍️');
            return;
        }
        if (text.length > 300) {
            showToast('слишком длинно, максимум 300 символов');
            return;
        }
        addQuestion(currentProfileId, text);
        input.value = '';
        showToast('вопрос отправлен анонимно!');
        render();
    };
    
    window.copyLink = function() {
        const linkInput = document.getElementById('profileLink');
        linkInput.select();
        document.execCommand('copy');
        showToast('ссылка скопирована! 🔗');
    };
    
    window.editBio = function() {
        const newBio = prompt('Введите новое описание:', allUsers[currentProfileId]?.bio || '');
        if (newBio !== null) {
            updateProfile({ bio: newBio });
        }
    };
    
    function showToast(msg) {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.style.display = 'block';
        setTimeout(() => {
            toast.style.display = 'none';
        }, 2000);
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    // ========== ИНИЦИАЛИЗАЦИЯ ==========
    function init() {
        loadAllUsers();
        
        // Определяем, чей профиль открыт
        const urlProfile = getProfileIdFromURL();
        const myProfile = getOrCreateMyProfile();
        
        if (urlProfile && allUsers[urlProfile]) {
            currentProfileId = urlProfile;
            isOwner = (currentProfileId === myProfile);
        } else if (urlProfile && !allUsers[urlProfile]) {
            // Создаём профиль, если перешли по ссылке на несуществующего
            allUsers[urlProfile] = {
                username: urlProfile,
                avatar: '✨',
                bio: 'задавай вопросы анонимно',
                questions: []
            };
            saveAllUsers();
            currentProfileId = urlProfile;
            isOwner = (currentProfileId === myProfile);
        } else {
            // Нет профиля в URL — показываем свой
            currentProfileId = myProfile;
            isOwner = true;
            // Обновляем URL без перезагрузки
            window.history.replaceState({}, '', window.location.href.split('#')[0] + '#' + myProfile);
        }
        
        render();
    }
    
    // Слушаем изменения хэша (если пользователь перешёл по другой ссылке)
    window.addEventListener('hashchange', () => {
        init();
    });
    
    window.addPremiumCode = function(code) {
        showToast('✨ Премиум активирован! Спасибо за поддержку');
    };
    
    init();
</script>
</body>
</html>
