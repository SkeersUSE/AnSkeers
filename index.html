<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Liquid Rumors — правда или действие</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 30% 20%, #1a1a2e, #0a0a15, #030308);
            font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif;
            padding: 20px;
            transition: background 0.3s ease;
            color: white;
        }

        /* Скины */
        body.skin-cherry { background: radial-gradient(circle at 30% 20%, #3a1a1a, #2a0a0a, #1a0303); }
        body.skin-ocean { background: radial-gradient(circle at 30% 20%, #1a3a3a, #0a2a2a, #031a1a); }
        body.skin-purple { background: radial-gradient(circle at 30% 20%, #2a1a3a, #1a0a2a, #0a031a); }
        body.skin-midnight { background: radial-gradient(circle at 30% 20%, #1a2a3a, #0a1a2a, #030a1a); }
        body.skin-gold { background: radial-gradient(circle at 30% 20%, #3a2a0a, #2a1a00, #1a0e00); }
        body.skin-rose { background: radial-gradient(circle at 30% 20%, #3a1a2a, #2a0a1a, #1a030a); }
        body.skin-cyan { background: radial-gradient(circle at 30% 20%, #0a3a3a, #002a2a, #001a1a); }
        body.skin-lava { background: radial-gradient(circle at 30% 20%, #4a1a0a, #3a0a00, #2a0000); }

        .glass {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(40px) saturate(180%);
            border: 0.5px solid rgba(255, 255, 255, 0.2);
            border-radius: 48px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.08);
        }

        .container { max-width: 500px; margin: 0 auto; }

        /* Верхняя панель */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px;
            margin-bottom: 16px;
        }
        .points-box {
            background: rgba(255,215,0,0.15);
            border-radius: 60px;
            padding: 8px 18px;
            font-weight: 600;
            color: #ffd966;
        }
        .level-box {
            background: rgba(255,255,255,0.1);
            border-radius: 60px;
            padding: 8px 18px;
            font-weight: 500;
            color: white;
            font-size: 13px;
        }

        /* Ежедневный бонус */
        .daily-bonus {
            background: rgba(255,255,255,0.05);
            border-radius: 60px;
            padding: 10px;
            text-align: center;
            margin-bottom: 16px;
            cursor: pointer;
            color: white;
        }

        /* Задания */
        .quests-grid {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }
        .quest-card {
            flex: 1;
            background: rgba(255,255,255,0.05);
            border-radius: 32px;
            padding: 10px;
            text-align: center;
            font-size: 11px;
            color: white;
        }

        .mode-selector {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }
        .mode-btn {
            flex: 1;
            background: rgba(255,255,255,0.08);
            border: 0.5px solid rgba(255,255,255,0.2);
            padding: 16px;
            border-radius: 60px;
            text-align: center;
            cursor: pointer;
            color: white;
        }
        .mode-btn.active {
            background: rgba(255,255,255,0.2);
            border-color: rgba(255,255,255,0.5);
        }
        .mode-emoji { font-size: 32px; }
        .mode-title { font-weight: 500; }

        .task-card {
            padding: 40px 24px;
            text-align: center;
            margin-bottom: 20px;
            min-height: 260px;
            cursor: pointer;
        }
        .task-emoji { font-size: 64px; }
        .task-text { font-size: 22px; font-weight: 500; margin: 16px 0; color: white; }
        .task-category { color: rgba(255,255,255,0.5); font-size: 12px; }
        
        .action-buttons {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }
        .spin-btn {
            flex: 1;
            background: linear-gradient(135deg, rgba(255,255,255,0.2), rgba(255,255,255,0.05));
            border: 0.5px solid rgba(255,255,255,0.3);
            padding: 16px;
            border-radius: 60px;
            font-weight: 600;
            cursor: pointer;
            color: white;
        }
        .spin-btn:active { transform: scale(0.96); }

        .add-section, .rating-section, .skins-section, .achievements-section, .lootbox-section, .donate-section {
            padding: 20px;
            margin-top: 16px;
        }
        .add-title { font-weight: 500; margin-bottom: 12px; display: flex; gap: 8px; align-items: center; color: white; }
        .add-input {
            width: 100%;
            background: rgba(255,255,255,0.08);
            border: 0.5px solid rgba(255,255,255,0.2);
            border-radius: 28px;
            padding: 14px;
            resize: none;
            margin-bottom: 12px;
            color: white;
        }
        .add-input::placeholder { color: rgba(255,255,255,0.4); }
        .add-submit {
            background: rgba(255,255,255,0.12);
            padding: 12px;
            border-radius: 60px;
            cursor: pointer;
            width: 100%;
            color: white;
            border: none;
        }
        select {
            width: 100%;
            background: rgba(255,255,255,0.08);
            border: 0.5px solid rgba(255,255,255,0.2);
            border-radius: 28px;
            padding: 12px;
            margin-bottom: 12px;
            color: white;
        }
        select option { background: #1a1a2e; color: white; }
        
        .rating-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 0.5px solid rgba(255,255,255,0.1);
            font-size: 13px;
            color: rgba(255,255,255,0.8);
        }
        
        .skin-btn {
            width: 55px;
            height: 55px;
            border-radius: 27.5px;
            cursor: pointer;
            border: 2px solid rgba(255,255,255,0.3);
            transition: 0.1s;
        }
        .skin-btn.active { border: 3px solid white; box-shadow: 0 0 15px white; }
        .skin-locked { opacity: 0.5; filter: grayscale(0.5); position: relative; }
        
        .achievement { 
            display: inline-block; 
            background: rgba(255,255,255,0.1); 
            border-radius: 60px; 
            padding: 6px 14px; 
            margin: 4px; 
            font-size: 12px; 
            color: white;
        }
        .achievement.unlocked { background: rgba(255,215,0,0.2); color: #ffd966; }
        
        .lootbox-btn {
            background: linear-gradient(135deg, #ff6b6b, #c92a2a);
            padding: 14px;
            border-radius: 60px;
            text-align: center;
            cursor: pointer;
            font-weight: 600;
            color: white;
        }
        
        /* Кнопка доната */
        .donate-btn {
            display: block;
            text-align: center;
            background: linear-gradient(135deg, rgba(255,215,0,0.2), rgba(255,215,0,0.05));
            border: 0.5px solid rgba(255,215,0,0.4);
            padding: 16px;
            border-radius: 60px;
            font-weight: 600;
            font-size: 18px;
            cursor: pointer;
            text-decoration: none;
            color: #ffd966;
            margin-bottom: 12px;
            transition: 0.2s;
        }
        .donate-btn:active { transform: scale(0.97); }
        
        .support-text {
            text-align: center;
            color: rgba(255,255,255,0.5);
            font-size: 13px;
            margin-top: 8px;
            margin-bottom: 16px;
        }
        
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(20px);
            padding: 10px 20px;
            border-radius: 60px;
            color: white;
            z-index: 1000;
            display: none;
            font-size: 14px;
            white-space: nowrap;
        }
        .user-id { font-size: 9px; color: rgba(255,255,255,0.2); text-align: center; margin-top: 8px; }
        .leaderboard-item { display: flex; justify-content: space-between; padding: 6px 0; font-size: 13px; color: rgba(255,255,255,0.8); }
        .skins-container { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
    </style>
</head>
<body>
<div class="container">
    <!-- Верхняя панель -->
    <div class="glass top-bar">
        <div class="points-box" id="pointsDisplay">💎 0</div>
        <div class="level-box" id="levelDisplay">Ур.1 Стекло</div>
    </div>

    <!-- Ежедневный бонус -->
    <div class="glass daily-bonus" id="dailyBonusBtn">
        Ежедневный бонус: <span id="dailyBonusText">забери!</span>
    </div>

    <!-- Ежедневные задания -->
    <div class="quests-grid" id="questsContainer"></div>

    <!-- Выбор режима -->
    <div class="mode-selector">
        <div class="mode-btn active" id="modeTruth"><div class="mode-emoji">🎤</div><div class="mode-title">Правда</div></div>
        <div class="mode-btn" id="ModeDare"><div class="mode-emoji">⚡</div><div class="mode-title">Действие</div></div>
    </div>

    <!-- Карточка задания -->
    <div class="glass task-card" id="taskCard">
        <div class="task-emoji" id="taskEmoji">🎲</div>
        <div class="task-text" id="taskText">Нажми «Крутить»</div>
        <div class="task-category" id="taskCategory">готов?</div>
    </div>

    <!-- Кнопки -->
    <div class="action-buttons">
        <button class="spin-btn" id="spinBtn">Крутить</button>
        <button class="spin-btn second-btn" id="randomBtn">Рандом</button>
    </div>

    <!-- Добавление вопроса -->
    <div class="glass add-section">
        <div class="add-title">Добавить свой вопрос</div>
        <textarea class="add-input" id="newQuestion" rows="2" placeholder="Например: Какой самый стыдный момент?"></textarea>
        <select id="questionType"><option value="truth">Правда</option><option value="dare">Действие</option></select>
        <button class="add-submit" id="addBtn">Добавить [+5💎]</button>
    </div>

    <!-- Рейтинг -->
    <div class="glass rating-section">
        <div class="add-title">Топ вопросов</div>
        <div id="ratingList"></div>
    </div>

    <!-- Таблица лидеров -->
    <div class="glass rating-section">
        <div class="add-title">Таблица лидеров</div>
        <div id="leaderboardList"></div>
    </div>

    <!-- Ачивки -->
    <div class="glass achievements-section">
        <div class="add-title">Достижения</div>
        <div id="achievementsList"></div>
    </div>

    <!-- Лутбокс -->
    <div class="glass lootbox-section">
        <div class="add-title">Лутбокс [х50💎]</div>
        <div class="lootbox-btn" id="lootboxBtn">Открыть кейс</div>
    </div>

    <!-- Магазин скинов -->
    <div class="glass skins-section">
        <div class="add-title">Магазин скинов</div>
        <div class="skins-container" id="skinsContainer"></div>
        <div style="text-align: center; margin-top: 12px;"><span id="currentSkinName" style="color:rgba(255,255,255,0.6);">текущий: Default</span></div>
    </div>

    <!-- КНОПКА ДОНАТА -->
    <a href="https://www.donationalerts.com/r/skeers" target="_blank" class="donate-btn" id="donateBtn">
        Поддержать проект
    </a>
    
    <!-- ПОДДЕРЖИВАЮЩАЯ НАДПИСЬ -->
    <div class="support-text">
        Ваша поддержка помогает проекту расти и становиться лучше!💙
    </div>

    <div class="user-id" id="userIdDisplay"></div>
</div>
<div id="toast" class="toast"></div>

<script>
    // ========== ID ПОЛЬЗОВАТЕЛЯ ==========
    let userId = localStorage.getItem('liquid_user_id');
    if (!userId) { userId = 'user_' + Math.random().toString(36).substr(2, 6); localStorage.setItem('liquid_user_id', userId); }
    document.getElementById('userIdDisplay').innerText = `ID: ${userId}`;

    // ========== ДАННЫЕ ПОЛЬЗОВАТЕЛЯ ==========
    let userData = {
        points: 0,
        level: 1,
        exp: 0,
        ownedSkins: ['default'],
        currentSkin: 'default',
        dailyBonusClaimed: false,
        lastDailyDate: '',
        quests: { spin: 0, like: 0, addQuestion: 0 },
        achievements: [],
        streak: 0,
        lastPlayDate: ''
    };

    let skinsList = [
        { id: 'default', name: 'Default', price: 0, gradient: 'linear-gradient(135deg, #1a1a2e, #0a0a15)' },
        { id: 'cherry', name: 'Cherry', price: 100, gradient: 'linear-gradient(135deg, #ff6b6b, #c92a2a)' },
        { id: 'ocean', name: 'Ocean', price: 150, gradient: 'linear-gradient(135deg, #4ecdc4, #0b5e7e)' },
        { id: 'purple', name: 'Purple', price: 150, gradient: 'linear-gradient(135deg, #b74bff, #5e2a8a)' },
        { id: 'midnight', name: 'Midnight', price: 200, gradient: 'linear-gradient(135deg, #2c3e50, #1a1a2e)' },
        { id: 'gold', name: 'Gold', price: 300, gradient: 'linear-gradient(135deg, #ffd700, #b8860b)' },
        { id: 'rose', name: 'Rose', price: 300, gradient: 'linear-gradient(135deg, #ff69b4, #c71585)' },
        { id: 'cyan', name: 'Cyan', price: 250, gradient: 'linear-gradient(135deg, #00ffff, #008080)' },
        { id: 'lava', name: 'Lava', price: 350, gradient: 'linear-gradient(135deg, #ff4500, #8b0000)' }
    ];

    // Ачивки
    let allAchievements = [
        { id: 'first_spin', name: '⚡ Первый спин', desc: 'Сделать 1 спин', condition: () => totalSpins >= 1, reward: 10 },
        { id: 'master_spin', name: '⚡ Мастер спина', desc: 'Сделать 50 спинов', condition: () => totalSpins >= 50, reward: 50 },
        { id: 'first_like', name: '⚡ Первый лайк', desc: 'Поставить 1 лайк', condition: () => totalLikes >= 1, reward: 5 },
        { id: 'creator', name: '⚡ Создатель', desc: 'Добавить 5 вопросов', condition: () => totalAdded >= 5, reward: 30 },
        { id: 'streak_3', name: '⚡ Стрик 3 дня', desc: 'Играть 3 дня подряд', condition: () => userData.streak >= 3, reward: 20 },
        { id: 'streak_7', name: '⚡ Стрик 7 дней', desc: 'Играть 7 дней подряд', condition: () => userData.streak >= 7, reward: 50 },
        { id: 'rich', name: '⚡ Богач', desc: 'Накопить 500 очков', condition: () => userData.points >= 500, reward: 100 },
        { id: 'collector', name: '⚡ Коллекционер', desc: 'Купить 3 скина', condition: () => userData.ownedSkins.length >= 4, reward: 50 }
    ];

    let truthQuestions = [
        { text: "Кто из присутствующих тебе нравится?", votes: 12 },
        { text: "Какую глупость ты делал ради лайков?", votes: 8 },
        { text: "Кому ты завидуешь?", votes: 5 },
        { text: "Что бы ты изменил в себе?", votes: 15 },
        { text: "Какой секрет ты скрываешь?", votes: 20 }
    ];
    let dareActions = [
        { text: "Сделай 10 отжиманий", votes: 14 },
        { text: "Отправь смешное фото в чат", votes: 10 },
        { text: "Станцуй 10 секунд", votes: 7 },
        { text: "Назови 3 недостатка", votes: 6 },
        { text: "Спой припев песни", votes: 11 }
    ];

    let currentMode = "truth", currentTask = null;
    let totalSpins = 0, totalLikes = 0, totalAdded = 0;

    // ========== ЗАГРУЗКА/СОХРАНЕНИЕ ==========
    function loadData() {
        const saved = localStorage.getItem(`liquid_rumors_${userId}`);
        if (saved) {
            try {
                const data = JSON.parse(saved);
                Object.assign(userData, data);
                if (data.truthQuestions) truthQuestions = data.truthQuestions;
                if (data.dareActions) dareActions = data.dareActions;
                if (data.totalSpins) totalSpins = data.totalSpins;
                if (data.totalLikes) totalLikes = data.totalLikes;
                if (data.totalAdded) totalAdded = data.totalAdded;
            } catch(e) {}
        }
        if (!userData.ownedSkins.includes('default')) userData.ownedSkins.push('default');
        if (!userData.achievements) userData.achievements = [];
        checkAchievements();
        updateUI();
        checkDailyBonus();
    }
    function saveData() {
        localStorage.setItem(`liquid_rumors_${userId}`, JSON.stringify({
            ...userData, truthQuestions, dareActions, totalSpins, totalLikes, totalAdded
        }));
    }

    // ========== УРОВНИ ==========
    function updateLevel() {
        let expNeeded = userData.level * 100;
        while (userData.exp >= expNeeded) {
            userData.exp -= expNeeded;
            userData.level++;
            expNeeded = userData.level * 100;
            showToast(`🎉 Уровень ${userData.level}!`);
        }
        const rankNames = ['Стекло', 'Жидкое стекло', 'Хрусталь', 'Сапфир', 'Рубин', 'Алмаз'];
        const rank = rankNames[Math.min(userData.level-1, rankNames.length-1)] || 'Легенда';
        document.getElementById('levelDisplay').innerHTML = `📊 Ур.${userData.level} ${rank}`;
    }

    function addPoints(amount) {
        userData.points += amount;
        userData.exp += amount;
        document.getElementById('pointsDisplay').innerHTML = `💎 ${userData.points}`;
        updateLevel();
        checkAchievements();
        saveData();
        updateLeaderboard();
    }

    // ========== ДОСТИЖЕНИЯ ==========
    function checkAchievements() {
        let newUnlock = false;
        allAchievements.forEach(ach => {
            if (!userData.achievements.includes(ach.id) && ach.condition()) {
                userData.achievements.push(ach.id);
                addPoints(ach.reward);
                showToast(`Достижение: ${ach.name} +${ach.reward}💎`);
                newUnlock = true;
            }
        });
        if (newUnlock) renderAchievements();
    }
    function renderAchievements() {
        const container = document.getElementById('achievementsList');
        container.innerHTML = allAchievements.map(ach => `
            <span class="achievement ${userData.achievements.includes(ach.id) ? 'unlocked' : ''}">
                ${userData.achievements.includes(ach.id) ? '✅' : '🔒'} ${ach.name}
            </span>
        `).join('');
    }

    // ========== ЕЖЕДНЕВНЫЙ БОНУС ==========
    function checkDailyBonus() {
        const today = new Date().toDateString();
        const lastDate = userData.lastDailyDate;
        const yesterday = new Date();
        yesterday.setDate(yesterday.getDate() - 1);
        
        if (lastDate === today) {
            document.getElementById('dailyBonusText').innerHTML = `уже получен сегодня!`;
            return;
        }
        if (lastDate === yesterday.toDateString()) {
            userData.streak++;
        } else {
            userData.streak = 1;
        }
        const bonusAmount = Math.min(10 + userData.streak * 2, 50);
        document.getElementById('dailyBonusText').innerHTML = `🎁 ${bonusAmount}💎 (стрик ${userData.streak} дн.)`;
    }
    function claimDailyBonus() {
        const today = new Date().toDateString();
        if (userData.lastDailyDate === today) { showToast("Сегодня уже забирал!"); return; }
        const bonusAmount = Math.min(10 + userData.streak * 2, 50);
        addPoints(bonusAmount);
        userData.lastDailyDate = today;
        userData.streak = userData.lastDailyDate === new Date(new Date().setDate(new Date().getDate()-1)).toDateString() ? userData.streak + 1 : 1;
        saveData();
        checkDailyBonus();
        showToast(`🎁 +${bonusAmount} очков! Стрик: ${userData.streak} дней`);
    }

    // ========== ЕЖЕДНЕВНЫЕ ЗАДАНИЯ ==========
    function renderQuests() {
        const container = document.getElementById('questsContainer');
        const questsList = [
            { icon: '🎲', name: 'Крутить 3 раза', current: userData.quests.spin, target: 3, reward: 15, type: 'spin' },
            { icon: '❤️', name: 'Поставить лайк', current: userData.quests.like, target: 1, reward: 10, type: 'like' },
            { icon: '✏️', name: 'Добавить вопрос', current: userData.quests.addQuestion, target: 1, reward: 20, type: 'add' }
        ];
        container.innerHTML = questsList.map(q => `
            <div class="quest-card">
                <div>${q.icon}</div>
                <div style="font-size:10px;">${q.current}/${q.target}</div>
                <div style="font-size:9px; color:#ffd966;">+${q.reward}💎</div>
            </div>
        `).join('');
    }
    function updateQuest(type) {
        if (type === 'spin') userData.quests.spin++;
        if (type === 'like') userData.quests.like++;
        if (type === 'add') userData.quests.addQuestion++;
        
        if (userData.quests.spin >= 3 && type === 'spin') { addPoints(15); userData.quests.spin = 0; showToast("Задание 'Крутить 3 раза' выполнено! +15💎"); }
        if (userData.quests.like >= 1 && type === 'like') { addPoints(10); userData.quests.like = 0; showToast("Задание 'Поставить лайк' выполнено! +10💎"); }
        if (userData.quests.addQuestion >= 1 && type === 'add') { addPoints(20); userData.quests.addQuestion = 0; showToast("Задание 'Добавить вопрос' выполнено! +20💎"); }
        saveData();
        renderQuests();
    }

    // ========== ЛУТБОКС ==========
    function openLootbox() {
        if (userData.points < 50) { showToast("Не хватает 50 очков!"); return; }
        userData.points -= 50;
        const random = Math.random();
        let reward = "";
        if (random < 0.4) {
            const lockedSkins = skinsList.filter(s => !userData.ownedSkins.includes(s.id) && s.price > 0);
            if (lockedSkins.length > 0) {
                const newSkin = lockedSkins[Math.floor(Math.random() * lockedSkins.length)];
                userData.ownedSkins.push(newSkin.id);
                reward = `Скин "${newSkin.name}"!`;
            } else { reward = `💎 30 очков`; addPoints(30); }
        } else if (random < 0.7) { reward = `💎 20 очков`; addPoints(20); }
        else { reward = `💎 50 очков`; addPoints(50); }
        showToast(`Лутбокс: ${reward}`);
        saveData();
        renderSkinShop();
        updateUI();
    }

    // ========== МАГАЗИН СКИНОВ ==========
    function renderSkinShop() {
        const container = document.getElementById('skinsContainer');
        container.innerHTML = skinsList.map(skin => `
            <div class="skin-btn ${!userData.ownedSkins.includes(skin.id) ? 'skin-locked' : ''} ${userData.currentSkin === skin.id ? 'active' : ''}"
                 style="background: ${skin.gradient};"
                 onclick="buyOrSelectSkin('${skin.id}', ${skin.price})"></div>
        `).join('');
        const skinNames = { default:'Default',cherry:'Cherry',ocean:'Ocean',purple:'Purple',midnight:'Midnight',gold:'Gold',rose:'Rose',cyan:'Cyan',lava:'Lava' };
        document.getElementById('currentSkinName').innerHTML = `текущий: ${skinNames[userData.currentSkin] || 'Default'}`;
    }
    function buyOrSelectSkin(skinId, price) {
        if (userData.ownedSkins.includes(skinId)) {
            userData.currentSkin = skinId;
            applySkin(skinId);
            showToast(`Скин ${skinId} применён`);
        } else if (userData.points >= price) {
            userData.points -= price;
            userData.ownedSkins.push(skinId);
            showToast(`Скин ${skinId} куплен за ${price}💎!`);
        } else {
            showToast(`Нужно ${price - userData.points}💎 больше`);
        }
        saveData();
        renderSkinShop();
        updateUI();
    }
    function applySkin(skin) {
        document.body.classList.remove('skin-cherry','skin-ocean','skin-purple','skin-midnight','skin-gold','skin-rose','skin-cyan','skin-lava');
        if (skin !== 'default') document.body.classList.add(`skin-${skin}`);
    }

    // ========== ТАБЛИЦА ЛИДЕРОВ ==========
    function updateLeaderboard() {
        let allUsers = JSON.parse(localStorage.getItem('liquid_leaderboard') || '{}');
        allUsers[userId] = userData.points;
        localStorage.setItem('liquid_leaderboard', JSON.stringify(allUsers));
        const sorted = Object.entries(allUsers).sort((a,b) => b[1] - a[1]).slice(0,10);
        const container = document.getElementById('leaderboardList');
        container.innerHTML = sorted.map(([id, pts], idx) => `<div class="leaderboard-item"><span>${idx+1}. ${id.slice(0,10)}</span><span>💎 ${pts}</span></div>`).join('');
    }

    // ========== ИГРОВАЯ ЛОГИКА ==========
    function getRandomTask() {
        let list = currentMode === "truth" ? truthQuestions : dareActions;
        if (!list.length) return null;
        return { ...list[Math.floor(Math.random() * list.length)], isTruth: currentMode === "truth" };
    }
    function spin() {
        totalSpins++;
        const task = getRandomTask();
        if (task) {
            currentTask = task;
            document.getElementById('taskEmoji').textContent = currentMode === "truth" ? "🎤" : "⚡";
            document.getElementById('taskText').textContent = task.text;
            document.getElementById('taskCategory').textContent = currentMode === "truth" ? "ПРАВДА • ответь честно" : "ДЕЙСТВИЕ • выполни сейчас";
            addPoints(3);
            updateQuest('spin');
            showToast(`+3💎 за спин`);
        }
        saveData();
        checkAchievements();
    }
    function likeTask() {
        if (currentTask) {
            totalLikes++;
            if (currentMode === "truth") {
                const q = truthQuestions.find(t => t.text === currentTask.text);
                if (q) q.votes++;
            } else {
                const d = dareActions.find(t => t.text === currentTask.text);
                if (d) d.votes++;
            }
            addPoints(5);
            updateQuest('like');
            updateRating();
            showToast(`+5💎`);
            saveData();
        }
    }
    function addCustomQuestion() {
        const text = document.getElementById('newQuestion').value.trim();
        const type = document.getElementById('questionType').value;
        if (!text) { showToast("Напиши вопрос!"); return; }
        totalAdded++;
        if (type === "truth") truthQuestions.push({ text, votes: 0 });
        else dareActions.push({ text, votes: 0 });
        addPoints(5);
        updateQuest('add');
        document.getElementById('newQuestion').value = '';
        updateRating();
        saveData();
        showToast(`+5💎`);
    }
    function updateRating() {
        const all = [...truthQuestions.map(q => ({ text: q.text, votes: q.votes })), ...dareActions.map(d => ({ text: d.text, votes: d.votes }))];
        all.sort((a,b) => b.votes - a.votes);
        const container = document.getElementById('ratingList');
        container.innerHTML = all.slice(0,5).map(item => `<div class="rating-item"><span>${item.text.slice(0,35)}</span><span>👍 ${item.votes}</span></div>`).join('');
    }
    function randomMode() {
        const newMode = Math.random() < 0.5 ? "truth" : "dare";
        if (newMode === "truth") { document.getElementById('modeTruth').classList.add('active'); document.getElementById('ModeDare').classList.remove('active'); }
        else { document.getElementById('ModeDare').classList.add('active'); document.getElementById('modeTruth').classList.remove('active'); }
        currentMode = newMode;
        spin();
    }
    function updateUI() {
        document.getElementById('pointsDisplay').innerHTML = `💎 ${userData.points}`;
        renderQuests();
        renderAchievements();
        renderSkinShop();
        updateRating();
        updateLeaderboard();
    }
    function showToast(msg) {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.style.display = 'block';
        setTimeout(() => toast.style.display = 'none', 1800);
    }

    // ========== ИНИЦИАЛИЗАЦИЯ ==========
    document.getElementById('modeTruth').onclick = () => { currentMode="truth"; document.getElementById('modeTruth').classList.add('active'); document.getElementById('ModeDare').classList.remove('active'); spin(); };
    document.getElementById('ModeDare').onclick = () => { currentMode="dare"; document.getElementById('ModeDare').classList.add('active'); document.getElementById('modeTruth').classList.remove('active'); spin(); };
    document.getElementById('spinBtn').onclick = spin;
    document.getElementById('randomBtn').onclick = randomMode;
    document.getElementById('addBtn').onclick = addCustomQuestion;
    document.getElementById('taskCard').ondblclick = likeTask;
    document.getElementById('dailyBonusBtn').onclick = claimDailyBonus;
    document.getElementById('lootboxBtn').onclick = openLootbox;
    
    // Делаем функции глобальными для консоли
    window.addPremiumCode = (code) => { addPoints(100); showToast("Премиум код +100💎"); };
    window.addBalance = (amount) => { addPoints(amount); };
    window.buyOrSelectSkin = buyOrSelectSkin;
    window.applySkin = applySkin;

    loadData();
    applySkin(userData.currentSkin);
    updateUI();
    spin();
</script>
</body>
</html>
