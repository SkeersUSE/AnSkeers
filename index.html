<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Мэр Мегаполиса — Престиж + Работники</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, 'SF Pro Display', 'Segoe UI', sans-serif;
            background: #000000;
            min-height: 100vh;
            color: #ffffff;
        }
        .container { max-width: 800px; margin: 0 auto; padding: 20px; }
        h1 { text-align: center; padding: 20px; font-size: 1.6em; background: rgba(255,255,255,0.05); backdrop-filter: blur(20px); border-radius: 55px; border: 1px solid rgba(255,255,255,0.3); margin-bottom: 20px; }
        
        /* Ресурсы */
        .resources-panel { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
        .resource-card { background: rgba(255,255,255,0.05); backdrop-filter: blur(20px); border-radius: 24px; padding: 12px; text-align: center; border: 1px solid rgba(255,255,255,0.2); }
        .resource-icon { font-size: 1.5em; }
        .resource-value { font-size: 1.3em; font-weight: bold; color: #ffd700; }
        .resource-label { font-size: 0.6em; opacity: 0.7; }
        
        /* Профиль и вход */
        .profile-panel { display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.05); backdrop-filter: blur(20px); border-radius: 60px; padding: 8px 16px; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
        .profile-info { display: flex; align-items: center; gap: 12px; }
        .avatar { width: 45px; height: 45px; background: linear-gradient(135deg, #ffd700, #ff8c00); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5em; cursor: pointer; }
        .username { font-weight: 600; font-size: 1.1em; cursor: pointer; }
        .logout-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3); padding: 6px 16px; border-radius: 30px; cursor: pointer; color: white; font-size: 0.8em; }
        
        .section-title { font-size: 0.85em; text-transform: uppercase; letter-spacing: 1px; color: rgba(255,255,255,0.7); margin: 20px 0 10px 8px; }
        .tabs { display: flex; gap: 8px; margin-bottom: 15px; flex-wrap: wrap; }
        .tab-btn { flex: 1; background: rgba(255,255,255,0.08); border: none; padding: 10px; border-radius: 30px; color: white; cursor: pointer; font-size: 0.75em; transition: all 0.2s; }
        .tab-btn.active { background: rgba(138,180,248,0.3); border-bottom: 2px solid #ffd700; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        /* Сетки */
        .buildings-grid, .upgrades-grid, .workers-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; margin-bottom: 20px; }
        .building-card, .upgrade-card, .worker-card { background: rgba(255,255,255,0.05); backdrop-filter: blur(20px); border-radius: 20px; padding: 10px; text-align: center; cursor: pointer; transition: all 0.2s; border: 1px solid rgba(255,255,255,0.2); position: relative; }
        .building-card:hover, .upgrade-card:hover, .worker-card:hover { background: rgba(255,255,255,0.12); transform: scale(1.02); }
        .building-icon, .upgrade-icon, .worker-icon { font-size: 1.8em; }
        .building-name, .upgrade-name, .worker-name { font-size: 0.8em; font-weight: 500; }
        .building-stats, .upgrade-stats { font-size: 0.6em; opacity: 0.7; }
        .building-price, .upgrade-price { color: #ffd700; font-size: 0.65em; margin-top: 5px; }
        .building-count, .upgrade-level { position: absolute; top: 5px; right: 8px; font-size: 0.65em; background: rgba(0,0,0,0.5); padding: 2px 6px; border-radius: 20px; }
        
        .progress-bar { background: rgba(255,255,255,0.1); border-radius: 20px; height: 6px; overflow: hidden; margin: 8px 0; }
        .progress-fill { background: linear-gradient(90deg, #ffd700, #ff8c00); height: 100%; transition: width 0.3s; }
        .happiness-fill { background: linear-gradient(90deg, #ff6b6b, #ffd700, #4ecdc4); height: 100%; transition: width 0.3s; }
        
        .action-btn { background: rgba(255,215,0,0.2); border: 1px solid rgba(255,215,0,0.5); padding: 10px; border-radius: 40px; cursor: pointer; font-size: 0.8em; color: #ffd700; width: 100%; margin-top: 8px; transition: all 0.2s; }
        .action-btn:active { transform: scale(0.98); }
        .action-btn.disabled { opacity: 0.5; cursor: not-allowed; pointer-events: none; }
        
        /* Таблица лидеров */
        .leaderboard { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; max-height: 400px; overflow-y: auto; }
        .leader-row { background: rgba(255,255,255,0.05); border-radius: 20px; padding: 10px 15px; display: flex; align-items: center; gap: 12px; }
        .leader-rank { width: 40px; font-weight: bold; color: #ffd700; }
        .leader-name { flex: 2; font-weight: 500; }
        .leader-prestige { width: 80px; text-align: center; }
        .leader-earned { width: 100px; text-align: center; color: #ffd700; }
        
        .modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.95); backdrop-filter: blur(20px); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .modal-card { background: rgba(20,30,50,0.95); backdrop-filter: blur(30px); border-radius: 48px; padding: 30px; width: 320px; border: 1px solid rgba(255,255,255,0.3); }
        .modal-card input { width: 100%; padding: 12px; margin: 10px 0; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3); border-radius: 30px; color: white; text-align: center; }
        .password-wrapper { position: relative; }
        .password-wrapper input { padding-right: 45px; }
        .toggle-password { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; background: none; border: none; font-size: 1.2em; }
        .modal-card button { background: #ffd700; border: none; padding: 12px; border-radius: 30px; font-weight: bold; width: 100%; margin-top: 5px; cursor: pointer; }
        .secondary-btn { background: rgba(255,255,255,0.1); color: white; }
        
        .footer { text-align: center; padding: 20px; font-size: 0.6em; opacity: 0.5; }
        @media (max-width: 550px) { .resources-panel { gap: 6px; } .resource-value { font-size: 1em; } }
    </style>
</head>
<body>
<div class="container">
    <h1>🏙️ Мэр Мегаполиса</h1>
    
    <div class="profile-panel" id="profilePanel">
        <div class="profile-info"><div class="avatar" onclick="openAuthModal()">👤</div><div class="username" id="usernameDisplay" onclick="openAuthModal()">Гость</div></div>
        <button class="logout-btn" id="logoutBtn" style="display:none;" onclick="logout()">🚪 ВЫЙТИ</button>
    </div>

    <div class="resources-panel">
        <div class="resource-card"><div class="resource-icon">💰</div><div class="resource-value" id="money">0</div><div class="resource-label">БЮДЖЕТ</div></div>
        <div class="resource-card"><div class="resource-icon">👥</div><div class="resource-value" id="population">0</div><div class="resource-label">НАСЕЛЕНИЕ</div></div>
        <div class="resource-card"><div class="resource-icon">😊</div><div class="resource-value" id="happiness">50</div><div class="resource-label">СЧАСТЬЕ %</div><div class="progress-bar"><div class="happiness-fill" id="happinessFill" style="width:50%"></div></div></div>
        <div class="resource-card"><div class="resource-icon">🏆</div><div class="resource-value" id="prestige">0</div><div class="resource-label">ПРЕСТИЖ</div></div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('buildings')">🏗️ ЗДАНИЯ</button>
        <button class="tab-btn" onclick="switchTab('workers')">👷 РАБОТНИКИ</button>
        <button class="tab-btn" onclick="switchTab('market')">🌍 РЫНОК</button>
        <button class="tab-btn" onclick="switchTab('leaders')">🏆 ЛИДЕРЫ</button>
        <button class="tab-btn" onclick="switchTab('stats')">📊 СТАТИСТИКА</button>
    </div>

    <div id="buildingsTab" class="tab-content active"><div class="buildings-grid" id="buildingsGrid"></div><button class="action-btn" id="collectTaxBtn">💰 СОБРАТЬ НАЛОГИ (x2)</button><button class="action-btn" id="festivalBtn">🎉 ФЕСТИВАЛЬ (500💰 → +15% счастья)</button></div>
    <div id="workersTab" class="tab-content"><div class="workers-grid" id="workersGrid"></div></div>
    <div id="marketTab" class="tab-content"><div class="section-title">🌍 МИРОВОЙ РЫНОК</div><div id="marketGrid" style="display:flex; flex-direction:column; gap:15px;"></div></div>
    <div id="leadersTab" class="tab-content"><div class="section-title">🏆 ТОП-20 ЛИДЕРОВ</div><div id="leaderboard" class="leaderboard"></div></div>
    <div id="statsTab" class="tab-content"><div class="section-title">📊 СТАТИСТИКА</div><div id="statsContainer"></div><button class="action-btn" id="prestigeBtn" style="background:rgba(255,85,85,0.2); color:#ff6b6b;">🔄 ПЕРЕРОДИТЬСЯ</button><button class="reset-btn" id="resetBtn" style="margin-top:10px; background:rgba(255,255,255,0.05); padding:10px; border-radius:30px; width:100%; cursor:pointer;">🔄 СБРОСИТЬ ПРОГРЕСС</button></div>
    <div class="footer">Управляй городом | Нанимай работников | Добывай ресурсы</div>
</div>

<script>
    // ========== СИСТЕМА АВТОРИЗАЦИИ ==========
    let currentUser = null;
    let users = JSON.parse(localStorage.getItem('mayor_users') || '{}');
    
    function openAuthModal() {
        if (currentUser) return;
        const modal = document.createElement('div');
        modal.className = 'modal';
        modal.innerHTML = `
            <div class="modal-card">
                <h3 style="text-align:center;">🔐 ВХОД / РЕГИСТРАЦИЯ</h3>
                <div style="display:flex; gap:10px; margin:15px 0;">
                    <button id="authLoginBtn" style="flex:1; background:rgba(255,215,0,0.3);">ВХОД</button>
                    <button id="authRegisterBtn" style="flex:1;">РЕГИСТРАЦИЯ</button>
                </div>
                <div id="authForm">
                    <input type="text" id="authUsername" placeholder="@никнейм" maxlength="20">
                    <div class="password-wrapper"><input type="password" id="authPassword" placeholder="Пароль"><button class="toggle-password" onclick="togglePassword('authPassword')">👁️</button></div>
                </div>
                <button id="authSubmitBtn">ВОЙТИ</button>
                <button class="secondary-btn" onclick="this.closest('.modal').remove()">ЗАКРЫТЬ</button>
                <div id="authError" style="color:#ff6b6b; margin-top:10px; text-align:center;"></div>
            </div>
        `;
        document.body.appendChild(modal);
        let isLogin = true;
        const updateForm = () => {
            const submitBtn = document.getElementById('authSubmitBtn');
            submitBtn.innerText = isLogin ? 'ВОЙТИ' : 'ЗАРЕГИСТРИРОВАТЬСЯ';
            document.getElementById('authError').innerText = '';
        };
        document.getElementById('authLoginBtn').onclick = () => { isLogin = true; updateForm(); };
        document.getElementById('authRegisterBtn').onclick = () => { isLogin = false; updateForm(); };
        document.getElementById('authSubmitBtn').onclick = () => {
            let username = document.getElementById('authUsername').value.trim();
            const password = document.getElementById('authPassword').value;
            if (!username.startsWith('@')) username = '@' + username;
            if (!username || !password) { document.getElementById('authError').innerText = 'Заполните поля'; return; }
            if (isLogin) {
                if (!users[username]) { document.getElementById('authError').innerText = 'Пользователь не найден'; return; }
                if (users[username].password !== password) { document.getElementById('authError').innerText = 'Неверный пароль'; return; }
                currentUser = username;
                localStorage.setItem('mayor_current_user', currentUser);
                loadUserGame();
                modal.remove();
                updateProfileUI();
            } else {
                if (users[username]) { document.getElementById('authError').innerText = 'Никнейм уже занят'; return; }
                users[username] = { password: password, gameData: null, stats: { totalEarned: 0, prestige: 0 } };
                localStorage.setItem('mayor_users', JSON.stringify(users));
                currentUser = username;
                localStorage.setItem('mayor_current_user', currentUser);
                initNewGame();
                modal.remove();
                updateProfileUI();
            }
        };
    }
    
    function updateProfileUI() {
        document.getElementById('usernameDisplay').innerText = currentUser || 'Гость';
        document.getElementById('logoutBtn').style.display = currentUser ? 'block' : 'none';
    }
    
    function logout() {
        if (currentUser) saveGameToUser();
        currentUser = null;
        localStorage.removeItem('mayor_current_user');
        location.reload();
    }
    
    function togglePassword(id) { const input = document.getElementById(id); input.type = input.type === 'password' ? 'text' : 'password'; }
    
    // ========== ИГРОВЫЕ ДАННЫЕ ==========
    let gameData = {
        money: 1000, population: 0, happiness: 50, prestige: 0, prestigeBonus: 1,
        buildings: { house: 0, commercial: 0, factory: 0, park: 0, school: 0, stadium: 0, hospital: 0, police: 0 },
        workers: { miner: { level: 1, hired: false, lastPay: Date.now(), inventory: 0, mining: false, miningEnd: 0 }, farmer: { level: 1, hired: false, lastPay: Date.now(), inventory: 0, farming: false, farmingEnd: 0 }, doctor: { level: 1, hired: false, lastPay: Date.now(), effect: 0 } },
        stats: { totalEarned: 0, totalBuildingsBuilt: 0, festivals: 0, lastTaxTime: 0, autoClickerWarnings: 0 }
    };
    
    const prestigeCosts = [0, 50000, 75000, 100000, 150000, 200000, 250000, 300000, 350000, 400000, 450000, 500000, 550000, 600000, 650000, 700000, 750000, 800000, 850000, 900000, 950000, 1000000, 1100000, 1200000, 1300000, 1500000];
    
    const buildings = {
        house: { name: "Жилой дом", icon: "🏠", basePrice: 800, income: 5, happiness: 0, population: 8 },
        commercial: { name: "ТЦ", icon: "🏬", basePrice: 2000, income: 20, happiness: 2, population: 5 },
        factory: { name: "Завод", icon: "🏭", basePrice: 3000, income: 40, happiness: -4, population: 3 },
        park: { name: "Парк", icon: "🌳", basePrice: 1500, income: 0, happiness: 5, population: 0 },
        school: { name: "Школа", icon: "🏫", basePrice: 2500, income: 0, happiness: 6, population: 0 },
        stadium: { name: "Стадион", icon: "⚽", basePrice: 4000, income: 15, happiness: 8, population: 2 },
        hospital: { name: "Больница", icon: "🏥", basePrice: 3500, income: 0, happiness: 10, population: 0 },
        police: { name: "Полиция", icon: "👮", basePrice: 3000, income: 0, happiness: 7, population: 0 }
    };
    
    const workerTypes = {
        miner: { name: "⛏️ Шахтёр", desc: "Добывает уголь", baseSalary: 450000, salaryHours: 3, baseProductionTime: 60, baseProduction: 1, baseInventory: 250, upgradeCost: 100000, produceItem: "coal" },
        farmer: { name: "🌾 Фермер", desc: "Выращивает рис", baseSalary: 450000, salaryHours: 3, baseProductionTime: 60, baseProduction: 1, baseInventory: 250, upgradeCost: 100000, produceItem: "rice" },
        doctor: { name: "🏥 Врач", desc: "Даёт +0.3% счастья", baseSalary: 450000, salaryHours: 3, effect: 0.3, upgradeCost: 100000 }
    };
    
    let resources = { coal: 0, rice: 0 };
    let salaryIntervals = {};
    let miningIntervals = {};
    let taxCooldown = false;
    
    function getBuildingPrice(basePrice) { return Math.floor(basePrice * (0.8 + gameData.prestige * 0.05) / gameData.prestigeBonus); }
    function getIncome() { let inc = 0; for (let [k,v] of Object.entries(gameData.buildings)) inc += v * (buildings[k]?.income || 0); return Math.floor(inc * (1 + gameData.prestige * 0.1)); }
    function getHappiness() { let h = 50; for (let [k,v] of Object.entries(gameData.buildings)) h += v * (buildings[k]?.happiness || 0); h -= gameData.buildings.factory * 4; if (gameData.workers.doctor.hired) h += gameData.workers.doctor.level * 0.3; return Math.min(100, Math.max(0, h)); }
    
    function buyBuilding(type) {
        const b = buildings[type];
        const price = getBuildingPrice(b.basePrice);
        if (gameData.money >= price) { gameData.money -= price; gameData.buildings[type]++; gameData.population += b.population; gameData.stats.totalBuildingsBuilt++; gameData.happiness = getHappiness(); updateUI(); saveGameToUser(); }
        else showNotif("❌ Недостаточно денег!");
    }
    
    async function collectTax() {
        if (!currentUser) { showNotif("❌ Сначала войдите в аккаунт!"); openAuthModal(); return; }
        if (taxCooldown) { showNotif("⏳ Налоги можно собирать раз в 2 секунды!"); return; }
        const now = Date.now();
        if (gameData.stats.lastTaxTime && now - gameData.stats.lastTaxTime < 200) { gameData.stats.autoClickerWarnings++; if (gameData.stats.autoClickerWarnings >= 3) { showNotif("🚫 Обнаружен автокликер! Вы кикнуты."); setTimeout(() => logout(), 1000); return; } }
        taxCooldown = true; setTimeout(() => { taxCooldown = false; }, 2000);
        gameData.stats.lastTaxTime = now;
        const income = getIncome(); const tax = Math.floor(income * 2);
        gameData.money += tax; gameData.stats.totalEarned += tax; updateUI(); saveGameToUser(); showNotif(`💰 +${tax} монет!`);
    }
    
    function festival() { if (gameData.money >= 500) { gameData.money -= 500; gameData.happiness = Math.min(100, gameData.happiness + 15); gameData.stats.festivals++; updateUI(); saveGameToUser(); showNotif("🎉 +15% счастья!"); } else showNotif("❌ Нужно 500💰"); }
    
    // ========== РАБОТНИКИ ==========
    function hireWorker(type) {
        const w = gameData.workers[type];
        if (w.hired) { showNotif("❌ Уже нанят"); return; }
        const cost = 50000 * (1 + gameData.prestige * 0.1);
        if (gameData.money >= cost) { gameData.money -= cost; w.hired = true; w.lastPay = Date.now(); startSalaryTimer(type); updateUI(); saveGameToUser(); showNotif(`✅ ${workerTypes[type].name} нанят!`); }
        else showNotif(`❌ Нужно ${Math.floor(cost)}💰`);
    }
    
    function startSalaryTimer(type) {
        if (salaryIntervals[type]) clearInterval(salaryIntervals[type]);
        salaryIntervals[type] = setInterval(() => {
            if (!gameData.workers[type].hired) return;
            const salary = workerTypes[type].baseSalary;
            if (gameData.money >= salary) { gameData.money -= salary; gameData.workers[type].lastPay = Date.now(); updateUI(); saveGameToUser(); }
            else { showNotif(`⚠️ ${workerTypes[type].name} уволился из-за невыплаты зарплаты!`); gameData.workers[type].hired = false; clearInterval(salaryIntervals[type]); updateUI(); saveGameToUser(); }
        }, workerTypes[type].salaryHours * 3600000);
    }
    
    function upgradeWorker(type) {
        const w = gameData.workers[type];
        if (!w.hired) { showNotif("❌ Сначала наймите работника"); return; }
        if (w.level >= 15) { showNotif("❌ Максимальный уровень 15"); return; }
        const cost = workerTypes[type].upgradeCost * w.level;
        if (gameData.money >= cost) { gameData.money -= cost; w.level++; updateUI(); saveGameToUser(); showNotif(`✅ ${workerTypes[type].name} улучшен до ${w.level} уровня!`); }
        else showNotif(`❌ Нужно ${cost}💰`);
    }
    
    function startMining(type) {
        const w = gameData.workers[type];
        if (!w.hired) { showNotif("❌ Работник не нанят"); return; }
        if (w.mining) { showNotif("❌ Уже добывает"); return; }
        const time = Math.max(5, workerTypes[type].baseProductionTime / w.level);
        w.mining = true; w.miningEnd = Date.now() + time * 1000;
        if (miningIntervals[type]) clearInterval(miningIntervals[type]);
        miningIntervals[type] = setInterval(() => {
            if (!w.mining || Date.now() >= w.miningEnd) {
                if (w.mining && Date.now() >= w.miningEnd) {
                    const amount = workerTypes[type].baseProduction * w.level;
                    const maxInv = workerTypes[type].baseInventory * w.level;
                    if (w.inventory + amount <= maxInv) { w.inventory += amount; showNotif(`⛏️ Добыто ${amount} ${workerTypes[type].produceItem === 'coal' ? 'угля' : 'риса'}!`); }
                    else showNotif(`⚠️ Инвентарь полон!`);
                }
                w.mining = false; clearInterval(miningIntervals[type]); updateUI(); saveGameToUser();
            }
        }, 1000);
        updateUI(); saveGameToUser();
    }
    
    function sellResource(type) {
        const price = 1000;
        const amount = resources[type];
        if (amount <= 0) { showNotif("❌ Нет ресурсов для продажи"); return; }
        gameData.money += amount * price; gameData.stats.totalEarned += amount * price;
        resources[type] = 0; updateUI(); saveGameToUser(); showNotif(`💰 Продано ${amount} ${type === 'coal' ? 'угля' : 'риса'} за ${amount * price}💰`);
    }
    
    // ========== ПРЕСТИЖ ==========
    function doPrestige() {
        if (!currentUser) { showNotif("❌ Войдите в аккаунт!"); return; }
        const nextCost = prestigeCosts[gameData.prestige + 1];
        if (!nextCost) { showNotif("❌ Максимальный престиж 25!"); return; }
        if (gameData.stats.totalEarned < nextCost) { showNotif(`❌ Нужно заработать ${nextCost}💰 для престижа ${gameData.prestige + 1}`); return; }
        gameData.prestige++; gameData.prestigeBonus = 1 + gameData.prestige * 0.1;
        gameData.money = 1000 * gameData.prestigeBonus;
        gameData.population = 0; gameData.happiness = 50;
        gameData.buildings = { house: 0, commercial: 0, factory: 0, park: 0, school: 0, stadium: 0, hospital: 0, police: 0 };
        gameData.workers = { miner: { level: 1, hired: false, lastPay: Date.now(), inventory: 0, mining: false, miningEnd: 0 }, farmer: { level: 1, hired: false, lastPay: Date.now(), inventory: 0, farming: false, farmingEnd: 0 }, doctor: { level: 1, hired: false, lastPay: Date.now(), effect: 0 } };
        resources = { coal: 0, rice: 0 };
        updateUI(); saveGameToUser(); showNotif(`✨ Престиж ${gameData.prestize}! Бонус x${gameData.prestigeBonus}`);
    }
    
    // ========== ТАБЛИЦА ЛИДЕРОВ ==========
    function updateLeaderboard() {
        const leaderboard = Object.entries(users).map(([name, data]) => ({ name, prestige: data.stats?.prestige || 0, earned: data.stats?.totalEarned || 0 }));
        leaderboard.sort((a,b) => { if (a.prestige !== b.prestige) return b.prestige - a.prestige; else return b.earned - a.earned; });
        const container = document.getElementById('leaderboard');
        if (!container) return;
        container.innerHTML = '<div class="leader-row"><div class="leader-rank">#</div><div class="leader-name">ИГРОК</div><div class="leader-prestige">ПРЕСТИЖ</div><div class="leader-earned">ЗАРАБОТАНО</div></div>';
        leaderboard.slice(0,20).forEach((u, i) => { container.innerHTML += `<div class="leader-row"><div class="leader-rank">${i+1}</div><div class="leader-name">${u.name}</div><div class="leader-prestige">${u.prestige}</div><div class="leader-earned">${Math.floor(u.earned)}💰</div></div>`; });
    }
    
    // ========== UI ==========
    function updateUI() {
        document.getElementById('money').innerText = Math.floor(gameData.money);
        document.getElementById('population').innerText = gameData.population;
        document.getElementById('happiness').innerText = gameData.happiness;
        document.getElementById('prestige').innerText = gameData.prestige;
        document.getElementById('happinessFill').style.width = gameData.happiness + '%';
        // Здания
        const bg = document.getElementById('buildingsGrid');
        if (bg) { bg.innerHTML = ''; for (let [t,b] of Object.entries(buildings)) { const price = getBuildingPrice(b.basePrice); bg.innerHTML += `<div class="building-card" onclick="buyBuilding('${t}')"><div class="building-icon">${b.icon}</div><div class="building-name">${b.name}</div><div class="building-stats">💰${b.income}/сек | 👥+${b.population}</div><div class="building-price">💰 ${price}</div><div class="building-count">${gameData.buildings[t]}</div></div>`; } }
        // Работники
        const wg = document.getElementById('workersGrid');
        if (wg) { wg.innerHTML = ''; for (let [t, w] of Object.entries(gameData.workers)) { const wt = workerTypes[t]; wg.innerHTML += `<div class="worker-card"><div class="worker-icon">${wt.name.split(' ')[0]}</div><div class="worker-name">${wt.name}</div><div class="building-stats">Ур.${w.level} | ${w.hired ? '✅ Нанят' : '❌ Не нанят'}</div><div class="building-price">💰 ${w.hired ? (wt.upgradeCost * w.level) : (50000 * (1 + gameData.prestige * 0.1))}</div><button class="action-btn" style="margin-top:5px; padding:5px;" onclick="${w.hired ? `upgradeWorker('${t}')` : `hireWorker('${t}')`}">${w.hired ? '🔧 Улучшить' : '🤝 Нанять'}</button>${w.hired && t !== 'doctor' ? `<button class="action-btn" style="margin-top:5px; padding:5px;" onclick="startMining('${t}')">⛏️ Добывать</button><div>📦 ${w.inventory}/${wt.baseInventory * w.level}</div>` : ''}${t === 'doctor' ? `<div>❤️ +${w.level * 0.3}% счастья</div>` : ''}</div>`; } }
        // Рынок
        const mg = document.getElementById('marketGrid');
        if (mg) { mg.innerHTML = `<div class="leader-row"><div>🪨 Уголь: ${resources.coal} шт</div><button class="action-btn" style="width:auto; padding:5px 15px;" onclick="sellResource('coal')">Продать все за ${resources.coal * 1000}💰</button></div><div class="leader-row"><div>🍚 Рис: ${resources.rice} шт</div><button class="action-btn" style="width:auto; padding:5px 15px;" onclick="sellResource('rice')">Продать все за ${resources.rice * 1000}💰</button></div>`; }
        // Статистика
        const sc = document.getElementById('statsContainer');
        if (sc) sc.innerHTML = `<div>💰 Всего заработано: ${Math.floor(gameData.stats.totalEarned)}</div><div>🏗️ Построено зданий: ${gameData.stats.totalBuildingsBuilt}</div><div>🎉 Фестивалей: ${gameData.stats.festivals}</div><div>⚠️ Предупреждений автокликера: ${gameData.stats.autoClickerWarnings}/3</div><div>💰 Следующий престиж (${gameData.prestige+1}): ${prestigeCosts[gameData.prestige+1] || 'MAX'}💰</div>`;
        updateLeaderboard();
    }
    
    function saveGameToUser() { if (currentUser && users[currentUser]) { users[currentUser].gameData = gameData; users[currentUser].stats = { totalEarned: gameData.stats.totalEarned, prestige: gameData.prestige }; localStorage.setItem('mayor_users', JSON.stringify(users)); } }
    function loadUserGame() { if (currentUser && users[currentUser]?.gameData) { gameData = users[currentUser].gameData; resources = gameData.workers.miner?.inventory !== undefined ? { coal: gameData.workers.miner.inventory, rice: gameData.workers.farmer.inventory } : { coal: 0, rice: 0 }; updateUI(); } else initNewGame(); }
    function initNewGame() { gameData = { money: 1000, population: 0, happiness: 50, prestige: 0, prestigeBonus: 1, buildings: { house: 0, commercial: 0, factory: 0, park: 0, school: 0, stadium: 0, hospital: 0, police: 0 }, workers: { miner: { level: 1, hired: false, lastPay: Date.now(), inventory: 0, mining: false, miningEnd: 0 }, farmer: { level: 1, hired: false, lastPay: Date.now(), inventory: 0, farming: false, farmingEnd: 0 }, doctor: { level: 1, hired: false, lastPay: Date.now(), effect: 0 } }, stats: { totalEarned: 0, totalBuildingsBuilt: 0, festivals: 0, lastTaxTime: 0, autoClickerWarnings: 0 } }; resources = { coal: 0, rice: 0 }; updateUI(); saveGameToUser(); }
    
    function switchTab(tab) { document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active')); document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active')); document.getElementById(tab + 'Tab').classList.add('active'); if (tab === 'leaders') updateLeaderboard(); }
    function showNotif(msg) { const d = document.createElement('div'); d.innerText = msg; d.style.cssText = 'position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#ffd700;color:#000;padding:10px 20px;border-radius:40px;z-index:1001;animation:fadeOut 2s forwards;'; document.body.appendChild(d); setTimeout(() => d.remove(), 2000); }
    
    let incomeInterval; function startIncomeLoop() { if (incomeInterval) clearInterval(incomeInterval); incomeInterval = setInterval(() => { if (currentUser) { const inc = getIncome(); if (inc > 0) { gameData.money += inc; gameData.stats.totalEarned += inc; updateUI(); saveGameToUser(); } } }, 5000); }
    
    document.getElementById('collectTaxBtn').onclick = collectTax;
    document.getElementById('festivalBtn').onclick = festival;
    document.getElementById('prestigeBtn').onclick = doPrestige;
    document.getElementById('resetBtn').onclick = () => { if (confirm("Сбросить прогресс?")) { initNewGame(); saveGameToUser(); updateUI(); } };
    
    window.buyBuilding = buyBuilding; window.hireWorker = hireWorker; window.upgradeWorker = upgradeWorker; window.startMining = startMining; window.sellResource = sellResource;
    window.switchTab = switchTab; window.togglePassword = togglePassword; window.openAuthModal = openAuthModal; window.logout = logout;
    
    const savedUser = localStorage.getItem('mayor_current_user');
    if (savedUser && users[savedUser]) { currentUser = savedUser; loadUserGame(); } else { currentUser = null; initNewGame(); }
    updateProfileUI();
    startIncomeLoop();
    const style = document.createElement('style'); style.textContent = '@keyframes fadeOut { 0% { opacity: 1; } 100% { opacity: 0; visibility: hidden; } }'; document.head.appendChild(style);
</script>
</body>
</html>
