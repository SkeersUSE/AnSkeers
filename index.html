<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Liquid Snap — анонимные вопросы</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 30% 10%, #1a1a2e, #0a0a15, #05050a);
            font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif;
            padding: 20px;
        }

        /* iOS 26 Liquid Glass эффект */
        .glass {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(40px) saturate(180%);
            -webkit-backdrop-filter: blur(40px) saturate(180%);
            border: 0.5px solid rgba(255, 255, 255, 0.2);
            border-radius: 48px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2), inset 0 1px 0 rgba(255, 255, 255, 0.08);
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
        }

        /* Шапка профиля */
        .profile-header {
            text-align: center;
            padding: 32px 20px;
            margin-bottom: 20px;
        }

        .avatar {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #ff6b6b, #4ecdc4);
            border-radius: 50%;
            margin: 0 auto 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .username {
            font-size: 28px;
            font-weight: 600;
            color: white;
            margin-bottom: 8px;
        }

        .bio {
            color: rgba(255,255,255,0.6);
            font-size: 14px;
        }

        .link-box {
            margin-top: 16px;
            background: rgba(255,255,255,0.1);
            padding: 12px;
            border-radius: 60px;
            display: flex;
            gap: 8px;
        }

        .link-box input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            font-size: 14px;
            padding: 0 12px;
            outline: none;
        }

        .copy-btn {
            background: rgba(255,255,255,0.2);
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            font-weight: 500;
        }

        /* Карточка вопроса */
        .question-card {
            padding: 24px;
            margin-bottom: 16px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .question-card:active {
            transform: scale(0.98);
        }

        .question-text {
            color: white;
            font-size: 17px;
            line-height: 1.4;
            margin-bottom: 12px;
        }

        .question-meta {
            display: flex;
            justify-content: space-between;
            color: rgba(255,255,255,0.4);
            font-size: 12px;
        }

        .answer-area {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 0.5px solid rgba(255,255,255,0.1);
            display: none;
        }

        .answer-area.show {
            display: block;
        }

        .answer-input {
            width: 100%;
            background: rgba(255,255,255,0.1);
            border: 0.5px solid rgba(255,255,255,0.2);
            border-radius: 28px;
            padding: 12px 16px;
            color: white;
            font-size: 14px;
            resize: none;
            font-family: inherit;
            outline: none;
        }

        .answer-btn {
            margin-top: 12px;
            background: rgba(255,255,255,0.2);
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            width: 100%;
        }

        /* Форма отправки вопроса */
        .ask-form {
            padding: 24px;
            margin-top: 20px;
            margin-bottom: 20px;
        }

        .ask-form textarea {
            width: 100%;
            background: rgba(255,255,255,0.08);
            border: 0.5px solid rgba(255,255,255,0.2);
            border-radius: 28px;
            padding: 16px;
            color: white;
            font-size: 16px;
            resize: none;
            font-family: inherit;
            outline: none;
        }

        .send-btn {
            margin-top: 16px;
            background: linear-gradient(135deg, rgba(255,255,255,0.3), rgba(255,255,255,0.1));
            border: 0.5px solid rgba(255,255,255,0.3);
            padding: 14px;
            border-radius: 60px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
        }

        .empty-state {
            text-align: center;
            padding: 48px 24px;
            color: rgba(255,255,255,0.4);
        }

        /* Монетизация */
        .donate-btn {
            display: block;
            text-align: center;
            padding: 14px;
            margin: 20px 0;
            background: rgba(255,215,0,0.15);
            border: 0.5px solid rgba(255,215,0,0.3);
            border-radius: 60px;
            color: #ffd966;
            text-decoration: none;
            font-weight: 500;
        }

        .ads-space {
            margin-top: 20px;
            padding: 16px;
            text-align: center;
            font-size: 10px;
            color: rgba(255,255,255,0.3);
            border-top: 0.5px solid rgba(255,255,255,0.1);
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(20px);
            padding: 12px 24px;
            border-radius: 60px;
            color: white;
            font-size: 14px;
            z-index: 1000;
            display: none;
        }
    </style>
</head>
<body>
<div class="container">
    <!-- Профиль -->
    <div class="glass profile-header">
        <div class="avatar">🍃</div>
        <div class="username">liquid_user</div>
        <div class="bio">спрашивай что угодно — анонимно ✨</div>
        <div class="link-box">
            <input type="text" id="profileLink" readonly value="loading...">
            <button class="copy-btn" onclick="copyLink()">Копировать</button>
        </div>
    </div>

    <!-- Секция с вопросами -->
    <div id="questionsList">
        <div class="glass empty-state">
            🤫 пока нет вопросов<br>будь первым!
        </div>
    </div>

    <!-- Форма отправки вопроса -->
    <div class="glass ask-form">
        <textarea id="questionInput" rows="3" placeholder="Спроси меня что-нибудь... (анонимно)"></textarea>
        <button class="send-btn" onclick="sendQuestion()">📩 Отправить анонимно</button>
    </div>

    <!-- Кнопка доната -->
    <a href="https://www.donationalerts.com/r/ваша_ссылка" target="_blank" class="donate-btn">
        ☕️ Поддержать проект
    </a>

    <!-- Реклама -->
    <div class="ads-space">
        <div id="adSensePlaceholder" style="min-height: 90px;">
            📱 реклама будет здесь
        </div>
        <div style="margin-top: 8px;">Liquid Snap • iOS 26 Liquid Glass</div>
    </div>
</div>

<div id="toast" class="toast"></div>

<script>
    // Генерация уникального ID пользователя (сохраняется в localStorage)
    let userId = localStorage.getItem('liquid_user_id');
    if (!userId) {
        userId = 'user_' + Math.random().toString(36).substr(2, 8);
        localStorage.setItem('liquid_user_id', userId);
    }

    // Ключ для хранения вопросов
    const STORAGE_KEY = 'liquid_snap_questions_' + userId;
    
    // Загрузка вопросов
    let questions = [];

    function loadQuestions() {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) {
            questions = JSON.parse(saved);
        } else {
            questions = [];
        }
        renderQuestions();
    }

    function saveQuestions() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(questions));
        renderQuestions();
    }

    function renderQuestions() {
        const container = document.getElementById('questionsList');
        
        if (questions.length === 0) {
            container.innerHTML = `<div class="glass empty-state">🤫 пока нет вопросов<br>будь первым!</div>`;
            return;
        }

        container.innerHTML = questions.map((q, idx) => `
            <div class="glass question-card" onclick="toggleAnswer(${idx})">
                <div class="question-text">${escapeHtml(q.text)}</div>
                <div class="question-meta">
                    <span>📨 анонимно</span>
                    <span>${q.answered ? '✅ есть ответ' : '⏳ ждёт ответа'}</span>
                </div>
                <div class="answer-area" id="answerArea-${idx}">
                    ${q.answered ? `
                        <div style="background:rgba(255,255,255,0.05); border-radius:24px; padding:12px; margin-bottom:12px; color:#aaa;">
                            💬 ${escapeHtml(q.answer)}
                        </div>
                    ` : `
                        <textarea class="answer-input" id="answerText-${idx}" rows="2" placeholder="написать ответ..."></textarea>
                        <button class="answer-btn" onclick="event.stopPropagation(); submitAnswer(${idx})">✏️ Ответить</button>
                    `}
                </div>
            </div>
        `).join('');
    }

    function toggleAnswer(idx) {
        const area = document.getElementById(`answerArea-${idx}`);
        if (area) {
            area.classList.toggle('show');
        }
    }

    function submitAnswer(idx) {
        const input = document.getElementById(`answerText-${idx}`);
        const answer = input.value.trim();
        if (!answer) {
            showToast('напиши ответ 😌');
            return;
        }
        questions[idx].answer = answer;
        questions[idx].answered = true;
        saveQuestions();
        showToast('ответ опубликован!');
    }

    function sendQuestion() {
        const input = document.getElementById('questionInput');
        const text = input.value.trim();
        if (!text) {
            showToast('напиши вопрос ✍️');
            return;
        }
        if (text.length > 300) {
            showToast('слишком длинно, максимум 300 символов');
            return;
        }

        questions.unshift({
            id: Date.now(),
            text: text,
            answered: false,
            answer: '',
            timestamp: new Date().toISOString()
        });
        saveQuestions();
        input.value = '';
        showToast('вопрос отправлен анонимно!');
    }

    function copyLink() {
        const linkInput = document.getElementById('profileLink');
        linkInput.select();
        document.execCommand('copy');
        showToast('ссылка скопирована! 🔗');
    }

    function showToast(msg) {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.style.display = 'block';
        setTimeout(() => {
            toast.style.display = 'none';
        }, 2000);
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
            return c;
        });
    }

    // Установка ссылки профиля
    function setProfileLink() {
        const link = window.location.href;
        document.getElementById('profileLink').value = link;
    }

    // Экспорт функции для консоли (премиум-код как в прошлом примере)
    window.addPremiumCode = function(code) {
        console.log('Premium code:', code);
        showToast('✨ Премиум активирован! Спасибо за поддержку');
        // Тут можно добавить платные фишки: удаление рекламы, темы и т.д.
    };

    // Инициализация
    loadQuestions();
    setProfileLink();

    // Автосохранение при закрытии
    window.addEventListener('beforeunload', () => {
        saveQuestions();
    });
</script>
</body>
</html>
