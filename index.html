<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Bunny Hop Parkour — 3D экшен | Автобег + плавная камера</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', 'Poppins', monospace;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            padding: 8px 18px;
            border-radius: 30px;
            color: #ffecb3;
            z-index: 10;
            pointer-events: none;
            font-weight: bold;
            border-left: 3px solid #ffaa44;
        }
        #score-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(8px);
            padding: 8px 24px;
            border-radius: 40px;
            color: #ffdd88;
            font-size: 1.5rem;
            font-weight: bold;
            font-family: monospace;
            z-index: 10;
            pointer-events: none;
        }
        #fps-panel {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: #000000aa;
            padding: 5px 14px;
            border-radius: 20px;
            color: #aaffdd;
            font-family: monospace;
            font-weight: bold;
            z-index: 10;
            pointer-events: none;
        }
        #controls {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: #000000aa;
            padding: 8px 16px;
            border-radius: 24px;
            color: #ccc;
            font-size: 12px;
            text-align: right;
            font-family: monospace;
            pointer-events: none;
            z-index: 10;
        }
        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #000000cc;
            backdrop-filter: blur(12px);
            padding: 20px 30px;
            border-radius: 50px;
            color: #ffaa66;
            font-size: 1.8rem;
            text-align: center;
            z-index: 20;
            white-space: nowrap;
            display: none;
            border: 2px solid #ffaa55;
            font-weight: bold;
        }
        button {
            position: absolute;
            bottom: 30%;
            left: 50%;
            transform: translateX(-50%);
            background: #f5a342;
            border: none;
            font-size: 1.2rem;
            font-weight: bold;
            padding: 12px 28px;
            border-radius: 60px;
            cursor: pointer;
            z-index: 25;
            display: none;
            font-family: inherit;
            box-shadow: 0 4px 0 #7a4010;
            transition: 0.05s linear;
        }
        button:active {
            transform: translateX(-50%) translateY(2px);
            box-shadow: 0 1px 0 #7a4010;
        }
        #click-to-lock {
            position: absolute;
            bottom: 30%;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            color: #ffdd99;
            padding: 12px 24px;
            border-radius: 60px;
            font-size: 1.2rem;
            font-weight: bold;
            z-index: 30;
            white-space: nowrap;
            pointer-events: none;
            transition: opacity 1s;
            font-family: monospace;
            border: 1px solid gold;
        }
        @media (max-width: 600px) {
            .game-over { font-size: 1rem; white-space: normal; width: 70%; }
            #score-panel { font-size: 1rem; top: 12px; right: 12px; }
            #click-to-lock { font-size: 0.9rem; white-space: nowrap; padding: 8px 16px; bottom: 25%; }
        }
    </style>
</head>
<body>
    <div id="ui">🏆 BUNNY HOP PARKOUR | АВТОБЕГ 🏆</div>
    <div id="score-panel">⭐ SCORE: <span id="scoreValue">0</span></div>
    <div id="fps-panel">FPS: <span id="fpsValue">--</span></div>
    <div id="controls">🖱️ МЫШЬ: поворот камеры (без инверсии)<br>🔹 ПРОБЕЛ: прыжок &nbsp;&nbsp;| 🔄 A/D: поворот</div>
    <div class="game-over" id="gameOverMsg">💀 GAME OVER 💀<br><span style="font-size:1rem;">Нажми R или кнопку</span></div>
    <button id="restartBtn">🔄 НОВАЯ ИГРА</button>
    <div id="click-to-lock">🔒 КЛИКНИ НА ЭКРАН ДЛЯ УПРАВЛЕНИЯ МЫШЬЮ</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // ---------- НАСТРОЙКИ СЦЕНЫ ----------
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a1030);
        scene.fog = new THREE.FogExp2(0x0a1030, 0.008);

        const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 200);
        camera.position.set(0, 3.2, 6.5);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // ----- ОСВЕЩЕНИЕ (яркое и контрастное) -----
        const ambient = new THREE.AmbientLight(0x404060);
        scene.add(ambient);
        
        const dirLight = new THREE.DirectionalLight(0xfff5c0, 1.2);
        dirLight.position.set(4, 10, 3);
        dirLight.castShadow = true;
        dirLight.receiveShadow = true;
        dirLight.shadow.mapSize.width = 1024;
        dirLight.shadow.mapSize.height = 1024;
        dirLight.shadow.camera.near = 0.5;
        dirLight.shadow.camera.far = 20;
        scene.add(dirLight);
        
        const backLight = new THREE.PointLight(0x5588aa, 0.5);
        backLight.position.set(-2, 3, -4);
        scene.add(backLight);
        
        const fillLight = new THREE.PointLight(0xffaa66, 0.45);
        fillLight.position.set(0, 1.5, 2);
        scene.add(fillLight);
        
        // Декоративная сетка для ориентации
        const gridHelper = new THREE.GridHelper(100, 30, 0x88aaff, 0x335588);
        gridHelper.position.y = -0.5;
        gridHelper.material.transparent = true;
        gridHelper.material.opacity = 0.25;
        scene.add(gridHelper);
        
        // ----- ПЕРЕМЕННЫЕ ИГРЫ -----
        let player;                 // Mesh игрока
        let playerVelocityY = 0;
        let isGrounded = true;
        let score = 0;
        let gameActive = true;
        
        // Скорость движения (автоматический бег)
        let currentSpeed = 8.0;     // м/с
        const BASE_SPEED = 8.0;
        let rotationYaw = 0;         // текущий угол поворота
        let targetYaw = 0;
        
        // Управление
        const keys = {
            ArrowLeft: false, ArrowRight: false,
            KeyA: false, KeyD: false,
            Space: false
        };
        
        let mouseSensitivity = 0.0023;
        
        // Объекты мира
        let platforms = [];
        let obstacles = [];
        let coins = [];
        
        let nextGenZ = 7;
        const GEN_STEP = 5.2;
        
        // Физика
        const GRAVITY = 23;
        const JUMP_FORCE = 8.7;
        
        // Для FPS
        let frameCount = 0;
        let lastFpsTime = performance.now();
        const fpsSpan = document.getElementById('fpsValue');
        const scoreSpan = document.getElementById('scoreValue');
        const gameOverDiv = document.getElementById('gameOverMsg');
        const restartBtn = document.getElementById('restartBtn');
        const clickToLockDiv = document.getElementById('click-to-lock');
        
        // Материалы
        const platformMat = new THREE.MeshStandardMaterial({ color: 0x679267, roughness: 0.5, metalness: 0.1 });
        const obstacleMat = new THREE.MeshStandardMaterial({ color: 0xc95c3a, roughness: 0.3, emissive: 0x221100 });
        const coinMat = new THREE.MeshStandardMaterial({ color: 0xffcc55, emissive: 0x442200, metalness: 0.7 });
        const playerMat = new THREE.MeshStandardMaterial({ color: 0x5bc0ff, emissive: 0x004466, metalness: 0.2 });
        
        // ----- СОЗДАНИЕ ИГРОКА -----
        function createPlayer() {
            const geometry = new THREE.BoxGeometry(0.8, 0.9, 0.8);
            const cube = new THREE.Mesh(geometry, playerMat);
            cube.castShadow = true;
            cube.receiveShadow = true;
            cube.position.set(0, 0.45, 0);
            scene.add(cube);
            // Добавим контур для стиля
            const wireGeo = new THREE.BoxGeometry(0.84, 0.94, 0.84);
            const wireMat = new THREE.MeshBasicMaterial({ color: 0xffaa66, wireframe: true, transparent: true, opacity: 0.35 });
            const outline = new THREE.Mesh(wireGeo, wireMat);
            cube.add(outline);
            return cube;
        }
        
        // ----- ГЕНЕРАЦИЯ УЧАСТКА (платформа + препятствия + монеты) -----
        function generateSegment(zPos) {
            // Основная платформа
            const platGeo = new THREE.BoxGeometry(3.8, 0.25, 5);
            const platform = new THREE.Mesh(platGeo, platformMat);
            platform.position.set(0, -0.1, zPos);
            platform.receiveShadow = true;
            platform.castShadow = true;
            scene.add(platform);
            platforms.push(platform);
            
            // Препятствия (0-2)
            const obsCount = Math.random() > 0.6 ? (Math.random() > 0.5 ? 1 : 2) : 0;
            for (let i = 0; i < obsCount; i++) {
                const xOff = (Math.random() - 0.5) * 2.3;
                const zOff = (Math.random() - 0.5) * 3.4;
                const height = 0.7 + Math.random() * 0.6;
                const obsGeo = new THREE.BoxGeometry(0.7, height, 0.7);
                const obs = new THREE.Mesh(obsGeo, obstacleMat);
                obs.position.set(xOff, height/2, zPos + zOff);
                obs.castShadow = true;
                scene.add(obs);
                obstacles.push(obs);
            }
            
            // Монеты (1-3)
            const coinAmount = Math.floor(Math.random() * 3) + 1;
            for (let i = 0; i < coinAmount; i++) {
                const coinGeo = new THREE.SphereGeometry(0.22, 16, 16);
                const coin = new THREE.Mesh(coinGeo, coinMat);
                const xCoin = (Math.random() - 0.5) * 2.7;
                const zCoin = zPos + (Math.random() - 0.5) * 3.8;
                coin.position.set(xCoin, 0.35, zCoin);
                coin.castShadow = true;
                scene.add(coin);
                coins.push(coin);
            }
        }
        
        // ----- УДАЛЕНИЕ СТАРЫХ ОБЪЕКТОВ -----
        function despawnBehind(playerZ) {
            const limit = playerZ - 14;
            for (let i = platforms.length-1; i >= 0; i--) {
                if (platforms[i].position.z < limit) {
                    scene.remove(platforms[i]);
                    platforms.splice(i,1);
                }
            }
            for (let i = obstacles.length-1; i >= 0; i--) {
                if (obstacles[i].position.z < limit) {
                    scene.remove(obstacles[i]);
                    obstacles.splice(i,1);
                }
            }
            for (let i = coins.length-1; i >= 0; i--) {
                if (coins[i].position.z < limit) {
                    scene.remove(coins[i]);
                    coins.splice(i,1);
                }
            }
        }
        
        // ----- СТОЛКНОВЕНИЕ С ПРЕПЯТСТВИЯМИ -----
        function checkCollision() {
            if (!gameActive) return true;
            const playerBox = new THREE.Box3().setFromObject(player);
            for (let obs of obstacles) {
                const obsBox = new THREE.Box3().setFromObject(obs);
                if (playerBox.intersectsBox(obsBox)) {
                    return true;
                }
            }
            return false;
        }
        
        // ----- СБОР МОНЕТ -----
        function collectCoins() {
            if (!gameActive) return;
            const playerBox = new THREE.Box3().setFromObject(player);
            for (let i = 0; i < coins.length; i++) {
                if (playerBox.intersectsBox(coins[i])) {
                    scene.remove(coins[i]);
                    coins.splice(i,1);
                    score += 10;
                    scoreSpan.innerText = score;
                    i--;
                    // вспышка
                    const flash = new THREE.PointLight(0xffaa66, 0.7, 3);
                    flash.position.copy(player.position);
                    scene.add(flash);
                    setTimeout(() => scene.remove(flash), 120);
                }
            }
        }
        
        // ----- ОБНОВЛЕНИЕ ФИЗИКИ И АВТОМАТИЧЕСКОГО БЕГА -----
        function updateGame(delta) {
            if (!gameActive || !player) return;
            let dt = Math.min(delta, 0.033);
            
            // АВТОМАТИЧЕСКИЙ БЕГ ВПЕРЁД по направлению камеры
            const forwardDir = new THREE.Vector3(Math.sin(rotationYaw), 0, Math.cos(rotationYaw)).normalize();
            const move = forwardDir.clone().multiplyScalar(currentSpeed * dt);
            let newX = player.position.x + move.x;
            let newZ = player.position.z + move.z;
            // Ограничение по ширине платформы
            newX = Math.min(Math.max(newX, -2.8), 2.8);
            player.position.x = newX;
            player.position.z = newZ;
            
            // Прыжок (пробел)
            if (isGrounded && keys.Space) {
                playerVelocityY = JUMP_FORCE;
                isGrounded = false;
                keys.Space = false;  // чтобы не прыгал каждый кадр
                // эффект пыли
                const dust = new THREE.PointLight(0xaaffcc, 0.5, 2);
                dust.position.copy(player.position);
                scene.add(dust);
                setTimeout(() => scene.remove(dust), 180);
            }
            
            // Гравитация
            if (!isGrounded) {
                playerVelocityY -= GRAVITY * dt;
                player.position.y += playerVelocityY * dt;
                if (player.position.y <= 0.45) {
                    player.position.y = 0.45;
                    playerVelocityY = 0;
                    isGrounded = true;
                }
            } else {
                player.position.y = 0.45;
            }
            
            // Проверка смертельного столкновения
            if (checkCollision()) {
                gameActive = false;
                gameOverDiv.style.display = "flex";
                restartBtn.style.display = "block";
                return;
            }
            collectCoins();
            
            // Генерация мира
            if (player.position.z > nextGenZ) {
                generateSegment(nextGenZ + 2.0);
                nextGenZ += GEN_STEP;
                // Постепенное увеличение скорости (сложность)
                if (currentSpeed < 12.8) currentSpeed += 0.018;
            }
            despawnBehind(player.position.z);
        }
        
        // ----- ПЛАВНАЯ КАМЕРА (третье лицо, без инверсии) -----
        function updateCamera(delta) {
            if (!player) return;
            // Плавное сглаживание поворота
            rotationYaw += (targetYaw - rotationYaw) * Math.min(1, delta * 14);
            // Расчёт позиции камеры относительно игрока
            const distance = 5.2;
            const height = 2.4;
            const camX = player.position.x - Math.sin(rotationYaw) * distance;
            const camZ = player.position.z - Math.cos(rotationYaw) * distance;
            camera.position.x = camX;
            camera.position.z = camZ;
            camera.position.y = player.position.y + height;
            // Точка фокуса — чуть впереди игрока
            const lookAtX = player.position.x + Math.sin(rotationYaw) * 1.8;
            const lookAtZ = player.position.z + Math.cos(rotationYaw) * 1.8;
            camera.lookAt(lookAtX, player.position.y + 0.8, lookAtZ);
        }
        
        // ----- ОБРАБОТКА ПОВОРОТА ОТ КЛАВИШ A/D (без инерции, но плавно)-----
        function handleTurnKeys(delta) {
            let turn = 0;
            const turnSpeedRad = 2.4; // радиан в секунду
            if (keys.KeyA || keys.ArrowLeft) turn = turnSpeedRad * delta;
            if (keys.KeyD || keys.ArrowRight) turn = -turnSpeedRad * delta;
            if (turn !== 0) targetYaw += turn;
        }
        
        // ----- ОБРАБОТЧИКИ СОБЫТИЙ -----
        function onMouseMove(e) {
            if (!gameActive) return;
            // Без инверсии: вправо -> + угол
            targetYaw += e.movementX * mouseSensitivity;
        }
        
        function onKeyDown(e) {
            const code = e.code;
            if (code === 'Space') {
                e.preventDefault();
                if (gameActive) keys.Space = true;
            }
            if (code === 'KeyA' || code === 'ArrowLeft') {
                e.preventDefault();
                keys.KeyA = keys.ArrowLeft = true;
            }
            if (code === 'KeyD' || code === 'ArrowRight') {
                e.preventDefault();
                keys.KeyD = keys.ArrowRight = true;
            }
            if (code === 'KeyR' && !gameActive) restartGame();
        }
        
        function onKeyUp(e) {
            const code = e.code;
            if (code === 'KeyA' || code === 'ArrowLeft') keys.KeyA = keys.ArrowLeft = false;
            if (code === 'KeyD' || code === 'ArrowRight') keys.KeyD = keys.ArrowRight = false;
            if (code === 'Space') keys.Space = false;
        }
        
        // ----- ПОЛНЫЙ РЕСТАРТ -----
        function restartGame() {
            // Чистка сцены
            platforms.forEach(p => scene.remove(p));
            obstacles.forEach(o => scene.remove(o));
            coins.forEach(c => scene.remove(c));
            platforms = [];
            obstacles = [];
            coins = [];
            if (player) scene.remove(player);
            
            gameActive = true;
            score = 0;
            currentSpeed = BASE_SPEED;
            scoreSpan.innerText = "0";
            targetYaw = 0;
            rotationYaw = 0;
            playerVelocityY = 0;
            isGrounded = true;
            nextGenZ = 7;
            gameOverDiv.style.display = "none";
            restartBtn.style.display = "none";
            
            player = createPlayer();
            player.position.set(0, 0.45, 0);
            
            // Генерация начальных участков трассы
            for (let z = -5; z <= 13; z += GEN_STEP) {
                generateSegment(z);
            }
            nextGenZ = 10;
            camera.position.set(0, 3.2, 6.5);
            camera.lookAt(0, 0.8, 2);
        }
        
        // ----- АНИМАЦИЯ И FPS -----
        let lastFrameTime = performance.now();
        function animate() {
            const now = performance.now();
            let delta = Math.min(0.033, (now - lastFrameTime) / 1000);
            lastFrameTime = now;
            
            if (delta > 0.001 && gameActive) {
                handleTurnKeys(delta);
                updateGame(delta);
            }
            updateCamera(delta);
            
            renderer.render(scene, camera);
            
            // Подсчёт FPS
            frameCount++;
            const nowSec = performance.now();
            if (nowSec - lastFpsTime >= 1000) {
                const fps = Math.round((frameCount * 1000) / (nowSec - lastFpsTime));
                fpsSpan.innerText = fps;
                frameCount = 0;
                lastFpsTime = nowSec;
            }
            requestAnimationFrame(animate);
        }
        
        // ----- ЗАХВАТ МЫШИ И ИНТЕРФЕЙС -----
        function lockMouse() {
            renderer.domElement.requestPointerLock();
        }
        
        renderer.domElement.addEventListener('click', () => {
            if (gameActive && document.pointerLockElement !== renderer.domElement) {
                renderer.domElement.requestPointerLock();
                clickToLockDiv.style.opacity = "0";
                setTimeout(() => {
                    if (clickToLockDiv) clickToLockDiv.style.display = "none";
                }, 1000);
            }
        });
        
        document.addEventListener('pointerlockchange', () => {
            if (document.pointerLockElement === renderer.domElement) {
                document.addEventListener('mousemove', onMouseMove);
                if (clickToLockDiv) clickToLockDiv.style.display = "none";
            } else {
                document.removeEventListener('mousemove', onMouseMove);
                if (gameActive && clickToLockDiv && clickToLockDiv.style.display !== 'none') {
                    clickToLockDiv.style.display = "flex";
                    clickToLockDiv.style.opacity = "1";
                }
            }
        });
        
        window.addEventListener('keydown', onKeyDown);
        window.addEventListener('keyup', onKeyUp);
        restartBtn.addEventListener('click', () => restartGame());
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        // ЗАПУСК
        restartGame();
        animate();
        
        // Дополнительные частицы для атмосферы (не нагружают)
        const particleCount = 600;
        const particleGeo = new THREE.BufferGeometry();
        const positions = new Float32Array(particleCount * 3);
        for (let i = 0; i < particleCount; i++) {
            positions[i*3] = (Math.random() - 0.5) * 60;
            positions[i*3+1] = Math.random() * 7;
            positions[i*3+2] = (Math.random() - 0.5) * 50 - 20;
        }
        particleGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        const particleMatGlow = new THREE.PointsMaterial({ color: 0x77aaff, size: 0.07, transparent: true, opacity: 0.4 });
        const particles = new THREE.Points(particleGeo, particleMatGlow);
        scene.add(particles);
        
        function animateParticles() {
            particles.rotation.y += 0.001;
            requestAnimationFrame(animateParticles);
        }
        animateParticles();
        
        console.log("Игра запущена! Персонаж бежит автоматически. Используй мышь и A/D для поворота, ПРОБЕЛ для прыжка.");
    </script>
</body>
</html>
