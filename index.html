<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Liquid Clicker — iOS 26 стиль</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 30% 20%, #1a1a2e, #0a0a15, #030308);
            font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* iOS 26 Liquid Glass */
        .glass {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(40px) saturate(180%);
            -webkit-backdrop-filter: blur(40px) saturate(180%);
            border: 0.5px solid rgba(255, 255, 255, 0.25);
            border-radius: 64px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }

        .container {
            width: 340px;
            text-align: center;
            padding: 32px 24px 40px;
        }

        h1 {
            font-size: 32px;
            font-weight: 590;
            background: linear-gradient(135deg, #fff, #aaa);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .sub {
            color: rgba(255,255,255,0.5);
            font-size: 14px;
            margin-bottom: 32px;
        }

        /* Счётчик */
        .counter {
            font-size: 88px;
            font-weight: 590;
            font-feature-settings: "tnum";
            color: white;
            text-shadow: 0 4px 20px rgba(0,0,0,0.3);
            margin: 20px 0;
            letter-spacing: 4px;
        }

        /* Главная кнопка клика */
        .click-btn {
            width: 200px;
            height: 200px;
            margin: 20px auto;
            background: linear-gradient(135deg, rgba(255,255,255,0.2), rgba(255,255,255,0.05));
            border-radius: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 80px;
            cursor: pointer;
            transition: all 0.08s linear;
            box-shadow: 0 20px 30px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.2);
            border: 0.5px solid rgba(255,255,255,0.3);
        }

        .click-btn:active {
            transform: scale(0.94);
            background: linear-gradient(135deg, rgba(255,255,255,0.3), rgba(255,255,255,0.1));
        }

        /* Бонусы */
        .bonus-panel {
            margin: 24px 0;
            display: flex;
            gap: 12px;
        }

        .bonus-btn {
            flex: 1;
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(20px);
            border: 0.5px solid rgba(255,255,255,0.2);
            padding: 12px;
            border-radius: 60px;
            color: white;
            font-size: 13px;
            cursor: pointer;
            transition: 0.1s;
        }

        .bonus-btn:active {
            transform: scale(0.96);
            background: rgba(255,255,255,0.2);
        }

        .bonus-btn.disabled {
            opacity: 0.4;
            pointer-events: none;
        }

        /* Донат и реклама */
        .donate {
            display: block;
            background: rgba(255,215,0,0.12);
            border: 0.5px solid rgba(255,215,0,0.3);
            border-radius: 60px;
            padding: 12px;
            margin-top: 20px;
            color: #ffd966;
            text-decoration: none;
            font-size: 14px;
        }

        .ads-space {
            margin-top: 20px;
            padding-top: 16px;
            border-top: 0.5px solid rgba(255,255,255,0.1);
            font-size: 10px;
            color: rgba(255,255,255,0.3);
            text-align: center;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(20px);
            padding: 10px 20px;
            border-radius: 60px;
            color: white;
            font-size: 14px;
            z-index: 1000;
            display: none;
            white-space: nowrap;
        }

        .reset {
            margin-top: 12px;
            background: none;
            border: none;
            color: rgba(255,255,255,0.3);
            font-size: 12px;
            cursor: pointer;
        }
    </style>
</head>
<body>
<div class="glass container">
    <h1>Liquid Clicker</h1>
    <div class="sub">нажимай на стекло ✨</div>

    <div class="counter" id="counter">0</div>

    <div class="click-btn" id="clickBtn">
        💎
    </div>

    <div class="bonus-panel">
        <div class="bonus-btn" id="bonus2x">⚡ x2 (10)</div>
        <div class="bonus-btn" id="bonusAuto">🤖 авто (50)</div>
    </div>

    <a href="https://www.donationalerts.com/r/ваша_ссылка" target="_blank" class="donate">
        ☕️ Поддержать проект
    </a>

    <div class="ads-space">
        📱 здесь будет реклама (AdSense)
    </div>

    <button class="reset" id="resetBtn">🔄 сбросить</button>
</div>

<div id="toast" class="toast"></div>

<script>
    // === ИГРОВЫЕ ПЕРЕМЕННЫЕ ===
    let clicks = 0;
    let clickPower = 1;
    let autoIncome = 0;
    let autoInterval = null;
    
    // Цены
    const PRICE_2X = 10;
    const PRICE_AUTO = 50;
    
    // DOM элементы
    const counterEl = document.getElementById('counter');
    const clickBtn = document.getElementById('clickBtn');
    const bonus2xBtn = document.getElementById('bonus2x');
    const bonusAutoBtn = document.getElementById('bonusAuto');
    const resetBtn = document.getElementById('resetBtn');
    const toastEl = document.getElementById('toast');
    
    // === ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ===
    function showToast(msg, duration = 1500) {
        toastEl.textContent = msg;
        toastEl.style.display = 'block';
        setTimeout(() => {
            toastEl.style.display = 'none';
        }, duration);
    }
    
    function saveGame() {
        localStorage.setItem('liquid_clicks', JSON.stringify({
            clicks: clicks,
            clickPower: clickPower,
            autoIncome: autoIncome
        }));
    }
    
    function loadGame() {
        const saved = localStorage.getItem('liquid_clicks');
        if (saved) {
            try {
                const data = JSON.parse(saved);
                clicks = data.clicks || 0;
                clickPower = data.clickPower || 1;
                autoIncome = data.autoIncome || 0;
            } catch(e) {}
        }
        updateUI();
        restartAuto();
    }
    
    function updateUI() {
        counterEl.textContent = Math.floor(clicks);
        
        // Обновляем кнопки
        if (clicks >= PRICE_2X) {
            bonus2xBtn.classList.remove('disabled');
        } else {
            bonus2xBtn.classList.add('disabled');
        }
        
        if (clicks >= PRICE_AUTO) {
            bonusAutoBtn.classList.remove('disabled');
        } else {
            bonusAutoBtn.classList.add('disabled');
        }
        
        // Текст кнопок с ценами
        if (clickPower === 1) {
            bonus2xBtn.innerHTML = `⚡ x2 (${PRICE_2X})`;
        } else {
            bonus2xBtn.innerHTML = `⚡ x2 (куплено)`;
        }
        
        if (autoIncome === 0) {
            bonusAutoBtn.innerHTML = `🤖 авто (${PRICE_AUTO})`;
        } else {
            bonusAutoBtn.innerHTML = `🤖 авто +${autoIncome}/сек`;
        }
        
        saveGame();
    }
    
    function restartAuto() {
        if (autoInterval) {
            clearInterval(autoInterval);
            autoInterval = null;
        }
        
        if (autoIncome > 0) {
            autoInterval = setInterval(() => {
                clicks += autoIncome;
                updateUI();
                // Эффект при авто-клике
                counterEl.style.transform = 'scale(1.05)';
                setTimeout(() => { counterEl.style.transform = 'scale(1)'; }, 100);
            }, 1000);
        }
    }
    
    // === ИГРОВЫЕ ДЕЙСТВИЯ ===
    function addClick() {
        clicks += clickPower;
        updateUI();
        
        // Анимация кнопки и счётчика
        clickBtn.style.transform = 'scale(0.94)';
        counterEl.style.transform = 'scale(1.1)';
        setTimeout(() => {
            clickBtn.style.transform = 'scale(1)';
            counterEl.style.transform = 'scale(1)';
        }, 80);
        
        // Лёгкая вибрация (если есть)
        if (navigator.vibrate) navigator.vibrate(20);
    }
    
    function buy2x() {
        if (clickPower > 1) {
            showToast('x2 уже куплен!');
            return;
        }
        if (clicks >= PRICE_2X) {
            clicks -= PRICE_2X;
            clickPower = 2;
            updateUI();
            showToast('💪 Мощность клика x2!');
        } else {
            showToast(`Нужно ${PRICE_2X} кликов`);
        }
    }
    
    function buyAuto() {
        if (autoIncome > 0) {
            showToast('Автокликер уже работает!');
            return;
        }
        if (clicks >= PRICE_AUTO) {
            clicks -= PRICE_AUTO;
            autoIncome = 1;
            updateUI();
            restartAuto();
            showToast('🤖 Автокликер активен! +1 в секунду');
        } else {
            showToast(`Нужно ${PRICE_AUTO} кликов`);
        }
    }
    
    function resetGame() {
        if (confirm('Сбросить весь прогресс?')) {
            clicks = 0;
            clickPower = 1;
            autoIncome = 0;
            restartAuto();
            updateUI();
            showToast('Прогресс сброшен');
        }
    }
    
    // === ПРЕМИУМ КОД (как вы просили) ===
    window.addPremiumCode = function(code) {
        console.log('Premium код активирован:', code);
        // Даём бонус за премиум код
        clicks += 100;
        updateUI();
        showToast('✨ Премиум активирован! +100 кликов');
    };
    
    // === ПОДСКАЗКА В КОНСОЛИ ===
    console.log('💎 Liquid Clicker запущен!');
    console.log('💡 Введите addPremiumCode("ЛЮБОЙ_КОД") для бонуса');
    
    // === СОБЫТИЯ ===
    clickBtn.addEventListener('click', addClick);
    bonus2xBtn.addEventListener('click', buy2x);
    bonusAutoBtn.addEventListener('click', buyAuto);
    resetBtn.addEventListener('click', resetGame);
    
    // === ЗАПУСК ===
    loadGame();
    restartAuto();
</script>
</body>
</html>
