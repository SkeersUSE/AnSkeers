<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Bunny Hop Parkour — 3D экшен с плавной камерой</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', 'Poppins', monospace;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            padding: 8px 18px;
            border-radius: 30px;
            color: #ffecb3;
            z-index: 10;
            pointer-events: none;
            font-weight: bold;
            border-left: 3px solid #ffaa44;
        }
        #score-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            padding: 8px 24px;
            border-radius: 40px;
            color: #ffdd88;
            font-size: 1.5rem;
            font-weight: bold;
            font-family: monospace;
            z-index: 10;
            pointer-events: none;
        }
        #fps-panel {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: #000000aa;
            padding: 5px 14px;
            border-radius: 20px;
            color: #aaffdd;
            font-family: monospace;
            font-weight: bold;
            z-index: 10;
            pointer-events: none;
        }
        #controls {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: #000000aa;
            padding: 8px 16px;
            border-radius: 24px;
            color: #ccc;
            font-size: 12px;
            text-align: right;
            font-family: monospace;
            pointer-events: none;
            z-index: 10;
        }
        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #000000cc;
            backdrop-filter: blur(12px);
            padding: 20px 30px;
            border-radius: 50px;
            color: #ffaa66;
            font-size: 1.8rem;
            text-align: center;
            z-index: 20;
            white-space: nowrap;
            display: none;
            border: 2px solid #ffaa55;
            font-weight: bold;
        }
        button {
            position: absolute;
            bottom: 30%;
            left: 50%;
            transform: translateX(-50%);
            background: #f5a342;
            border: none;
            font-size: 1.2rem;
            font-weight: bold;
            padding: 12px 28px;
            border-radius: 60px;
            cursor: pointer;
            z-index: 25;
            display: none;
            font-family: inherit;
            box-shadow: 0 4px 0 #7a4010;
            transition: 0.05s linear;
        }
        button:active {
            transform: translateX(-50%) translateY(2px);
            box-shadow: 0 1px 0 #7a4010;
        }
        @media (max-width: 600px) {
            .game-over { font-size: 1rem; white-space: normal; width: 70%; }
            #score-panel { font-size: 1rem; top: 12px; right: 12px; }
        }
    </style>
</head>
<body>
    <div id="ui">🏆 BUNNY HOP PARKOUR 🏆</div>
    <div id="score-panel">⭐ SCORE: <span id="scoreValue">0</span></div>
    <div id="fps-panel">FPS: <span id="fpsValue">--</span></div>
    <div id="controls">🖱️ МЫШЬ: поворот камеры (без инверсии)<br>🔹 ПРОБЕЛ: прыжок &nbsp;&nbsp;| 🔄 A/D: поворот</div>
    <div class="game-over" id="gameOverMsg">💀 GAME OVER 💀<br><span style="font-size:1rem;">Нажми R или кнопку</span></div>
    <button id="restartBtn">🔄 НОВАЯ ИГРА</button>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // ---------- НАСТРОЙКИ ----------
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a1030);
        scene.fog = new THREE.FogExp2(0x0a1030, 0.01);

        const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 200);
        camera.position.set(0, 3.2, 7);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // ----- ОСВЕЩЕНИЕ (чтобы точно всё было видно) -----
        // Ambient
        const ambient = new THREE.AmbientLight(0x404060);
        scene.add(ambient);
        // Главный направленный свет
        const dirLight = new THREE.DirectionalLight(0xfff5c0, 1.2);
        dirLight.position.set(4, 10, 3);
        dirLight.castShadow = true;
        dirLight.receiveShadow = true;
        dirLight.shadow.mapSize.width = 1024;
        dirLight.shadow.mapSize.height = 1024;
        dirLight.shadow.camera.near = 0.5;
        dirLight.shadow.camera.far = 20;
        scene.add(dirLight);
        // Заполняющий свет сзади
        const backLight = new THREE.PointLight(0x5588aa, 0.5);
        backLight.position.set(-2, 3, -4);
        scene.add(backLight);
        // Тёплый свет снизу
        const fillLight = new THREE.PointLight(0xffaa66, 0.4);
        fillLight.position.set(0, 1, 2);
        scene.add(fillLight);
        
        // Декоративная сетка (пол)
        const gridHelper = new THREE.GridHelper(80, 40, 0x88aaff, 0x335588);
        gridHelper.position.y = -0.5;
        gridHelper.material.transparent = true;
        gridHelper.material.opacity = 0.25;
        scene.add(gridHelper);
        
        // ----- ПЕРЕМЕННЫЕ ИГРЫ -----
        let player;                 // Mesh игрока
        let playerVelocityY = 0;
        let isGrounded = true;
        let score = 0;
        let gameActive = true;
        
        let forwardSpeed = 8.2;          // базовая скорость бега
        let currentSpeed = forwardSpeed;
        let rotationYaw = 0;              // текущий угол камеры/игрока
        let targetYaw = 0;
        
        // Управление мышью (без инверсии)
        let mouseSensitivity = 0.0022;
        let mouseX = 0;
        
        // Состояние клавиш
        const keys = {
            ArrowLeft: false, ArrowRight: false,
            KeyA: false, KeyD: false,
            Space: false
        };
        
        // Объекты мира
        let platforms = [];     // платформы
        let obstacles = [];     // препятствия
        let coins = [];         // монеты
        
        let nextGenZ = 6;
        const GEN_STEP = 5.5;    // интервал генерации
        
        // Физика прыжка
        const GRAVITY = 22;
        const JUMP_FORCE = 8.5;
        
        // Для FPS
        let frameCount = 0;
        let lastFpsTime = performance.now();
        const fpsSpan = document.getElementById('fpsValue');
        const scoreSpan = document.getElementById('scoreValue');
        const gameOverDiv = document.getElementById('gameOverMsg');
        const restartBtn = document.getElementById('restartBtn');
        
        // Материалы
        const platformMat = new THREE.MeshStandardMaterial({ color: 0x679267, roughness: 0.5, metalness: 0.1 });
        const obstacleMat = new THREE.MeshStandardMaterial({ color: 0xc95c3a, roughness: 0.3, emissive: 0x221100 });
        const coinMat = new THREE.MeshStandardMaterial({ color: 0xffcc55, emissive: 0x442200, metalness: 0.7 });
        const playerMat = new THREE.MeshStandardMaterial({ color: 0x5bc0ff, emissive: 0x004466, metalness: 0.2 });
        
        // ----- СОЗДАНИЕ ИГРОКА -----
        function createPlayer() {
            const geometry = new THREE.BoxGeometry(0.8, 0.9, 0.8);
            const cube = new THREE.Mesh(geometry, playerMat);
            cube.castShadow = true;
            cube.receiveShadow = true;
            cube.position.set(0, 0.45, 0);
            scene.add(cube);
            // Добавим небольшой контур
            const wireGeo = new THREE.BoxGeometry(0.84, 0.94, 0.84);
            const wireMat = new THREE.MeshBasicMaterial({ color: 0xffaa66, wireframe: true, transparent: true, opacity: 0.35 });
            const outline = new THREE.Mesh(wireGeo, wireMat);
            cube.add(outline);
            return cube;
        }
        
        // ----- ГЕНЕРАЦИЯ СЕГМЕНТА (платформа + препятствия + монеты) -----
        function generateSegment(zPos) {
            // Платформа (ширина 3.6, длина 5)
            const platGeo = new THREE.BoxGeometry(3.6, 0.25, 5);
            const platform = new THREE.Mesh(platGeo, platformMat);
            platform.position.set(0, -0.1, zPos);
            platform.receiveShadow = true;
            platform.castShadow = true;
            scene.add(platform);
            platforms.push(platform);
            
            // Препятствия (0-2)
            const obsCount = Math.random() > 0.65 ? (Math.random() > 0.5 ? 1 : 2) : 0;
            for (let i = 0; i < obsCount; i++) {
                const xOff = (Math.random() - 0.5) * 2.2;
                const zOff = (Math.random() - 0.5) * 3.4;
                const height = 0.7 + Math.random() * 0.6;
                const obsGeo = new THREE.BoxGeometry(0.7, height, 0.7);
                const obs = new THREE.Mesh(obsGeo, obstacleMat);
                obs.position.set(xOff, height/2, zPos + zOff);
                obs.castShadow = true;
                scene.add(obs);
                obstacles.push(obs);
            }
            
            // Монеты (1-3 шт)
            const coinAmount = Math.floor(Math.random() * 3) + 1;
            for (let i = 0; i < coinAmount; i++) {
                const coinGeo = new THREE.SphereGeometry(0.22, 16, 16);
                const coin = new THREE.Mesh(coinGeo, coinMat);
                const xCoin = (Math.random() - 0.5) * 2.6;
                const zCoin = zPos + (Math.random() - 0.5) * 3.8;
                coin.position.set(xCoin, 0.35, zCoin);
                coin.castShadow = true;
                scene.add(coin);
                coins.push(coin);
            }
        }
        
        // ----- ОЧИСТКА СТАРЫХ ОБЪЕКТОВ -----
        function despawnBehind(playerZ) {
            const limit = playerZ - 12;
            // платформы
            for (let i = platforms.length-1; i >= 0; i--) {
                if (platforms[i].position.z < limit) {
                    scene.remove(platforms[i]);
                    platforms.splice(i,1);
                }
            }
            for (let i = obstacles.length-1; i >= 0; i--) {
                if (obstacles[i].position.z < limit) {
                    scene.remove(obstacles[i]);
                    obstacles.splice(i,1);
                }
            }
            for (let i = coins.length-1; i >= 0; i--) {
                if (coins[i].position.z < limit) {
                    scene.remove(coins[i]);
                    coins.splice(i,1);
                }
            }
        }
        
        // ----- СТОЛКНОВЕНИЕ С ПРЕПЯТСТВИЯМИ (AABB) -----
        function checkCollision() {
            if (!gameActive) return true;
            const playerBox = new THREE.Box3().setFromObject(player);
            for (let obs of obstacles) {
                const obsBox = new THREE.Box3().setFromObject(obs);
                if (playerBox.intersectsBox(obsBox)) {
                    return true;
                }
            }
            return false;
        }
        
        // ----- СБОР МОНЕТ -----
        function collectCoinsAndScore() {
            if (!gameActive) return;
            const playerBox = new THREE.Box3().setFromObject(player);
            for (let i=0; i<coins.length; i++) {
                const coinBox = new THREE.Box3().setFromObject(coins[i]);
                if (playerBox.intersectsBox(coins[i])) {
                    scene.remove(coins[i]);
                    coins.splice(i,1);
                    score += 10;
                    scoreSpan.innerText = score;
                    i--;
                    // визуальный эффект вспышки
                    const spark = new THREE.PointLight(0xffaa66, 0.6, 3);
                    spark.position.copy(player.position);
                    scene.add(spark);
                    setTimeout(() => scene.remove(spark), 120);
                }
            }
        }
        
        // ----- ОБНОВЛЕНИЕ ФИЗИКИ И ДВИЖЕНИЯ -----
        function updateGame(delta) {
            if (!gameActive || !player) return;
            let dt = Math.min(delta, 0.033);
            
            // Движение вперёд по направлению камеры (вдоль оси Z в локальном направлении)
            const forwardDir = new THREE.Vector3(Math.sin(rotationYaw), 0, Math.cos(rotationYaw)).normalize();
            const move = forwardDir.clone().multiplyScalar(currentSpeed * dt);
            let newX = player.position.x + move.x;
            let newZ = player.position.z + move.z;
            // Ограничение по ширине платформы
            newX = Math.min(Math.max(newX, -2.6), 2.6);
            player.position.x = newX;
            player.position.z = newZ;
            
            // Прыжок
            if (isGrounded && keys.Space) {
                playerVelocityY = JUMP_FORCE;
                isGrounded = false;
                keys.Space = false;
                // Эффект
                const dust = new THREE.PointLight(0x88bbff, 0.5, 2);
                dust.position.copy(player.position);
                scene.add(dust);
                setTimeout(() => scene.remove(dust), 180);
            }
            
            // Гравитация
            if (!isGrounded) {
                playerVelocityY -= GRAVITY * dt;
                player.position.y += playerVelocityY * dt;
                if (player.position.y <= 0.45) {
                    player.position.y = 0.45;
                    playerVelocityY = 0;
                    isGrounded = true;
                }
            } else {
                player.position.y = 0.45;
            }
            
            // Проверки
            if (checkCollision()) {
                gameActive = false;
                gameOverDiv.style.display = "flex";
                restartBtn.style.display = "block";
                return;
            }
            collectCoinsAndScore();
            
            // Генерация мира
            if (player.position.z > nextGenZ) {
                generateSegment(nextGenZ + 2.2);
                nextGenZ += GEN_STEP;
                // Постепенное увеличение скорости
                if (currentSpeed < 13.5) currentSpeed += 0.02;
            }
            despawnBehind(player.position.z);
        }
        
        // ----- ПЛАВНАЯ КАМЕРА (след за игроком, вращение без инверсии) -----
        function updateCamera(delta) {
            if (!player) return;
            // Плавное сглаживание угла поворота
            rotationYaw += (targetYaw - rotationYaw) * Math.min(1, delta * 12);
            // Расчёт позиции камеры: сзади-сверху
            const distance = 5.4;
            const height = 2.3;
            const camX = player.position.x - Math.sin(rotationYaw) * distance;
            const camZ = player.position.z - Math.cos(rotationYaw) * distance;
            camera.position.x = camX;
            camera.position.z = camZ;
            camera.position.y = player.position.y + height;
            // Смотрим чуть впереди игрока
            const lookAtX = player.position.x + Math.sin(rotationYaw) * 1.8;
            const lookAtZ = player.position.z + Math.cos(rotationYaw) * 1.8;
            camera.lookAt(lookAtX, player.position.y + 0.7, lookAtZ);
        }
        
        // ----- УПРАВЛЕНИЕ С КЛАВИАРЫ (поворот A/D) -----
        function handleTurnKeys(delta) {
            let turn = 0;
            const turnSpeed = 2.3; // радиан в секунду
            if (keys.KeyA || keys.ArrowLeft) turn = turnSpeed * delta;
            if (keys.KeyD || keys.ArrowRight) turn = -turnSpeed * delta;
            if (turn !== 0) targetYaw += turn;
        }
        
        // ----- ОБРАБОТЧИКИ СОБЫТИЙ -----
        function onMouseMove(e) {
            if (!gameActive) return;
            // Без инверсии: движение мыши вправо → увеличение угла
            targetYaw += e.movementX * mouseSensitivity;
        }
        
        function onKeyDown(e) {
            const code = e.code;
            if (code === 'Space') {
                e.preventDefault();
                if (gameActive) keys.Space = true;
            }
            if (code === 'KeyA' || code === 'ArrowLeft') keys.KeyA = keys.ArrowLeft = true;
            if (code === 'KeyD' || code === 'ArrowRight') keys.KeyD = keys.ArrowRight = true;
            if (code === 'KeyR' && !gameActive) restartGame();
        }
        
        function onKeyUp(e) {
            const code = e.code;
            if (code === 'KeyA' || code === 'ArrowLeft') keys.KeyA = keys.ArrowLeft = false;
            if (code === 'KeyD' || code === 'ArrowRight') keys.KeyD = keys.ArrowRight = false;
            if (code === 'Space') keys.Space = false;
        }
        
        // ----- РЕСТАРТ -----
        function restartGame() {
            // Очистить старые объекты
            platforms.forEach(p => scene.remove(p));
            obstacles.forEach(o => scene.remove(o));
            coins.forEach(c => scene.remove(c));
            platforms = [];
            obstacles = [];
            coins = [];
            if (player) scene.remove(player);
            
            gameActive = true;
            score = 0;
            currentSpeed = forwardSpeed;
            scoreSpan.innerText = "0";
            targetYaw = 0;
            rotationYaw = 0;
            playerVelocityY = 0;
            isGrounded = true;
            nextGenZ = 6;
            gameOverDiv.style.display = "none";
            restartBtn.style.display = "none";
            
            player = createPlayer();
            player.position.set(0, 0.45, 0);
            
            // Генерация начальных платформ
            for (let z = -4; z <= 12; z += GEN_STEP) {
                generateSegment(z);
            }
            nextGenZ = 9;
            camera.position.set(0, 3.2, 7);
            camera.lookAt(0, 0.8, 2);
        }
        
        // ----- АНИМАЦИЯ И FPS -----
        let lastFrame = performance.now();
        function animate() {
            const now = performance.now();
            let delta = Math.min(0.033, (now - lastFrame) / 1000);
            lastFrame = now;
            
            if (delta > 0.001) {
                handleTurnKeys(delta);
                updateGame(delta);
                updateCamera(delta);
            }
            
            renderer.render(scene, camera);
            
            // FPS счётчик
            frameCount++;
            const nowSec = performance.now();
            if (nowSec - lastFpsTime >= 1000) {
                const fps = Math.round((frameCount * 1000) / (nowSec - lastFpsTime));
                fpsSpan.innerText = fps;
                frameCount = 0;
                lastFpsTime = nowSec;
            }
            
            requestAnimationFrame(animate);
        }
        
        // ----- ЗАХВАТ МЫШИ -----
        function requestLock() {
            renderer.domElement.requestPointerLock();
        }
        renderer.domElement.addEventListener('click', () => {
            if (gameActive && document.pointerLockElement !== renderer.domElement) {
                renderer.domElement.requestPointerLock();
            }
        });
        document.addEventListener('pointerlockchange', () => {
            if (document.pointerLockElement === renderer.domElement) {
                document.addEventListener('mousemove', onMouseMove);
            } else {
                document.removeEventListener('mousemove', onMouseMove);
            }
        });
        
        window.addEventListener('keydown', onKeyDown);
        window.addEventListener('keyup', onKeyUp);
        restartBtn.addEventListener('click', () => restartGame());
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        // СТАРТ!
        restartGame();
        animate();
        
        // Дополнительные визуальные эффекты: парящие частицы (не нагружают)
        const particleCount = 400;
        const particleGeometry = new THREE.BufferGeometry();
        const positions = new Float32Array(particleCount * 3);
        for (let i = 0; i < particleCount; i++) {
            positions[i*3] = (Math.random() - 0.5) * 50;
            positions[i*3+1] = Math.random() * 6;
            positions[i*3+2] = (Math.random() - 0.5) * 40 - 15;
        }
        particleGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        const particleMat = new THREE.PointsMaterial({ color: 0x77aaff, size: 0.08, transparent: true, opacity: 0.4 });
        const particles = new THREE.Points(particleGeometry, particleMat);
        scene.add(particles);
        
        function rotateParticles() {
            particles.rotation.y += 0.0015;
            requestAnimationFrame(rotateParticles);
        }
        rotateParticles();
        
        console.log("Игра запущена — плавный паркур, камера без багов!");
    </script>
</body>
</html>
