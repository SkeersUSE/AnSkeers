<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Liquid Rumors — правда или действие</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 30% 20%, #1a1a2e, #0a0a15, #030308);
            font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif;
            padding: 20px;
            transition: background 0.3s ease;
        }

        /* Скины */
        body.skin-cherry {
            background: radial-gradient(circle at 30% 20%, #3a1a1a, #2a0a0a, #1a0303);
        }
        body.skin-ocean {
            background: radial-gradient(circle at 30% 20%, #1a3a3a, #0a2a2a, #031a1a);
        }
        body.skin-purple {
            background: radial-gradient(circle at 30% 20%, #2a1a3a, #1a0a2a, #0a031a);
        }
        body.skin-midnight {
            background: radial-gradient(circle at 30% 20%, #1a2a3a, #0a1a2a, #030a1a);
        }
        body.skin-gold {
            background: radial-gradient(circle at 30% 20%, #3a2a0a, #2a1a00, #1a0e00);
        }
        body.skin-rose {
            background: radial-gradient(circle at 30% 20%, #3a1a2a, #2a0a1a, #1a030a);
        }

        .glass {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(40px) saturate(180%);
            -webkit-backdrop-filter: blur(40px) saturate(180%);
            border: 0.5px solid rgba(255, 255, 255, 0.2);
            border-radius: 48px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.08);
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
        }

        /* Хедер */
        .header {
            text-align: center;
            padding: 24px 20px;
            margin-bottom: 20px;
        }

        h1 {
            font-size: 34px;
            font-weight: 590;
            background: linear-gradient(135deg, #fff, #aaa);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }

        .sub {
            color: rgba(255,255,255,0.5);
            font-size: 14px;
            margin-top: 6px;
        }

        /* Выбор режима */
        .mode-selector {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }

        .mode-btn {
            flex: 1;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            border: 0.5px solid rgba(255, 255, 255, 0.2);
            padding: 16px;
            border-radius: 60px;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
        }

        .mode-btn.active {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.5);
            box-shadow: 0 0 15px rgba(255,255,255,0.1);
        }

        .mode-emoji {
            font-size: 32px;
            margin-bottom: 6px;
        }

        .mode-title {
            color: white;
            font-weight: 500;
            font-size: 16px;
        }

        /* Карточка задания */
        .task-card {
            padding: 40px 24px;
            text-align: center;
            margin-bottom: 20px;
            min-height: 280px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            cursor: pointer;
        }

        .task-emoji {
            font-size: 64px;
            margin-bottom: 20px;
        }

        .task-text {
            color: white;
            font-size: 22px;
            font-weight: 500;
            line-height: 1.4;
            margin-bottom: 20px;
        }

        .task-category {
            color: rgba(255,255,255,0.4);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Кнопки */
        .action-buttons {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }

        .spin-btn {
            flex: 1;
            background: linear-gradient(135deg, rgba(255,255,255,0.2), rgba(255,255,255,0.05));
            border: 0.5px solid rgba(255,255,255,0.3);
            padding: 16px;
            border-radius: 60px;
            color: white;
            font-weight: 600;
            font-size: 18px;
            cursor: pointer;
            transition: 0.1s;
        }

        .spin-btn:active {
            transform: scale(0.96);
        }

        .second-btn {
            background: rgba(255,255,255,0.08);
            border: 0.5px solid rgba(255,255,255,0.2);
        }

        /* Добавление своего вопроса */
        .add-section {
            padding: 20px;
            margin-top: 20px;
        }

        .add-title {
            color: white;
            font-weight: 500;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .add-input {
            width: 100%;
            background: rgba(255,255,255,0.08);
            border: 0.5px solid rgba(255,255,255,0.2);
            border-radius: 28px;
            padding: 14px 18px;
            color: white;
            font-size: 15px;
            resize: none;
            font-family: inherit;
            outline: none;
            margin-bottom: 12px;
        }

        .add-submit {
            background: rgba(255,255,255,0.12);
            border: 0.5px solid rgba(255,255,255,0.25);
            padding: 12px;
            border-radius: 60px;
            color: white;
            cursor: pointer;
            width: 100%;
        }

        select {
            width: 100%;
            background: rgba(255,255,255,0.08);
            border: 0.5px solid rgba(255,255,255,0.2);
            border-radius: 28px;
            padding: 12px;
            color: white;
            margin-bottom: 12px;
            font-size: 14px;
        }
        select option {
            background: #1a1a2e;
        }

        /* Рейтинг */
        .rating-section {
            padding: 20px;
            margin-top: 20px;
        }

        .rating-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 0.5px solid rgba(255,255,255,0.1);
            color: rgba(255,255,255,0.7);
        }

        .rating-text {
            flex: 1;
            font-size: 14px;
        }

        .rating-votes {
            color: #ffd966;
            font-weight: 500;
        }

        /* Скины */
        .skins-section {
            padding: 20px;
            margin-top: 16px;
        }

        .skin-btn {
            width: 55px;
            height: 55px;
            border-radius: 27.5px;
            cursor: pointer;
            border: 2px solid rgba(255,255,255,0.3);
            transition: all 0.1s;
        }
        .skin-btn:active {
            transform: scale(0.93);
        }
        .skin-btn.active {
            border: 3px solid white;
            box-shadow: 0 0 15px rgba(255,255,255,0.6);
        }
        .skin-locked {
            opacity: 0.5;
            filter: grayscale(0.5);
            position: relative;
        }
        .skin-locked::after {
            content: "🔒";
            position: absolute;
            font-size: 20px;
            margin-left: 18px;
            margin-top: 16px;
        }

        .donate {
            display: block;
            text-align: center;
            padding: 14px;
            margin: 20px 0;
            background: rgba(255,215,0,0.12);
            border: 0.5px solid rgba(255,215,0,0.3);
            border-radius: 60px;
            color: #ffd966;
            text-decoration: none;
        }

        .ads-space {
            margin-top: 16px;
            padding: 12px;
            text-align: center;
            font-size: 10px;
            color: rgba(255,255,255,0.3);
            border-top: 0.5px solid rgba(255,255,255,0.1);
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(20px);
            padding: 12px 24px;
            border-radius: 60px;
            color: white;
            z-index: 1000;
            display: none;
            font-size: 14px;
            white-space: nowrap;
        }

        .user-id {
            font-size: 10px;
            color: rgba(255,255,255,0.3);
            text-align: center;
            margin-top: 8px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="glass header">
        <h1>Liquid Rumors</h1>
        <div class="sub">правда или действие • играй с друзьями</div>
    </div>

    <!-- Выбор режима -->
    <div class="mode-selector">
        <div class="mode-btn active" id="modeTruth">
            <div class="mode-emoji">🎤</div>
            <div class="mode-title">Правда</div>
        </div>
        <div class="mode-btn" id="ModeDare">
            <div class="mode-emoji">⚡</div>
            <div class="mode-title">Действие</div>
        </div>
    </div>

    <!-- Карточка с заданием -->
    <div class="glass task-card" id="taskCard">
        <div class="task-emoji" id="taskEmoji">🎲</div>
        <div class="task-text" id="taskText">Нажми «Крутить» чтобы начать</div>
        <div class="task-category" id="taskCategory">готов?</div>
    </div>

    <!-- Кнопки -->
    <div class="action-buttons">
        <button class="spin-btn" id="spinBtn">🎲 Крутить</button>
        <button class="spin-btn second-btn" id="randomBtn">🎯 Рандом</button>
    </div>

    <!-- Добавление своих вопросов -->
    <div class="glass add-section">
        <div class="add-title">✏️ Добавить свой вопрос</div>
        <textarea class="add-input" id="newQuestion" rows="2" placeholder="Например: Какой самый стыдный момент в твоей жизни?"></textarea>
        <select id="questionType">
            <option value="truth">Правда</option>
            <option value="dare">Действие</option>
        </select>
        <button class="add-submit" id="addBtn">➕ Добавить в игру</button>
    </div>

    <!-- Рейтинг -->
    <div class="glass rating-section">
        <div class="add-title">🏆 Топ вопросов</div>
        <div id="ratingList"></div>
    </div>

    <!-- МАГАЗИН СКИНОВ -->
    <div class="glass skins-section">
        <div class="add-title">🎨 Магазин скинов</div>
        <div style="display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; padding: 8px 0;">
            <div class="skin-btn" data-skin="default" data-price="0" style="background: linear-gradient(135deg, #1a1a2e, #0a0a15);"></div>
            <div class="skin-btn" data-skin="cherry" data-price="50" style="background: linear-gradient(135deg, #ff6b6b, #c92a2a);"></div>
            <div class="skin-btn" data-skin="ocean" data-price="50" style="background: linear-gradient(135deg, #4ecdc4, #0b5e7e);"></div>
            <div class="skin-btn" data-skin="purple" data-price="50" style="background: linear-gradient(135deg, #b74bff, #5e2a8a);"></div>
            <div class="skin-btn" data-skin="midnight" data-price="50" style="background: linear-gradient(135deg, #2c3e50, #1a1a2e);"></div>
            <div class="skin-btn" data-skin="gold" data-price="100" style="background: linear-gradient(135deg, #ffd700, #b8860b);"></div>
            <div class="skin-btn" data-skin="rose" data-price="100" style="background: linear-gradient(135deg, #ff69b4, #c71585);"></div>
        </div>
        <div style="text-align: center; margin-top: 12px;">
            <span id="currentSkinName" style="color: rgba(255,255,255,0.6); font-size: 13px;">текущий: Default</span>
            <div style="font-size: 11px; color: #ffd966; margin-top: 6px;" id="balanceDisplay">💰 Баланс: 0 руб</div>
        </div>
    </div>

    <!-- Донат для пополнения баланса -->
    <a href="#" id="donateLink" class="donate">
        💎 Пополнить баланс (от 50 руб)
    </a>

    <div class="ads-space">
        📱 реклама будет здесь (AdSense)
    </div>
    <div class="user-id" id="userIdDisplay"></div>
</div>

<div id="toast" class="toast"></div>

<script>
    // ========== УНИКАЛЬНЫЙ ID ПОЛЬЗОВАТЕЛЯ ==========
    let userId = localStorage.getItem('liquid_user_id');
    if (!userId) {
        userId = 'user_' + Math.random().toString(36).substr(2, 8);
        localStorage.setItem('liquid_user_id', userId);
    }
    document.getElementById('userIdDisplay').innerText = `ID: ${userId} (ваши скины привязаны к этому ID)`;

    // ========== ДАННЫЕ ПОЛЬЗОВАТЕЛЯ (сохраняются на аккаунте) ==========
    let userData = {
        balance: 0,
        ownedSkins: ['default'],
        currentSkin: 'default'
    };

    function loadUserData() {
        const saved = localStorage.getItem(`liquid_user_${userId}`);
        if (saved) {
            try {
                const data = JSON.parse(saved);
                userData.balance = data.balance || 0;
                userData.ownedSkins = data.ownedSkins || ['default'];
                userData.currentSkin = data.currentSkin || 'default';
            } catch(e) {}
        }
        updateBalanceDisplay();
        updateSkinShopUI();
        applySkin(userData.currentSkin);
    }

    function saveUserData() {
        localStorage.setItem(`liquid_user_${userId}`, JSON.stringify({
            balance: userData.balance,
            ownedSkins: userData.ownedSkins,
            currentSkin: userData.currentSkin
        }));
    }

    function updateBalanceDisplay() {
        document.getElementById('balanceDisplay').innerHTML = `💰 Баланс: ${userData.balance} руб`;
    }

    // ========== ПОКУПКА СКИНА ==========
    function buySkin(skinId, price) {
        if (userData.ownedSkins.includes(skinId)) {
            showToast(`🎨 У вас уже есть этот скин!`);
            return false;
        }
        if (userData.balance >= price) {
            userData.balance -= price;
            userData.ownedSkins.push(skinId);
            saveUserData();
            updateBalanceDisplay();
            updateSkinShopUI();
            showToast(`✅ Скин куплен! Теперь выберите его в магазине`);
            return true;
        } else {
            showToast(`💰 Не хватает ${price - userData.balance} руб. Пополните баланс!`);
            return false;
        }
    }

    function selectSkin(skinId) {
        if (!userData.ownedSkins.includes(skinId)) {
            showToast(`🔒 Скин заблокирован. Купите его за рубли!`);
            return;
        }
        userData.currentSkin = skinId;
        applySkin(skinId);
        saveUserData();
        updateSkinShopUI();
        showToast(`🎨 Скин применён!`);
    }

    function applySkin(skin) {
        document.body.classList.remove('skin-cherry', 'skin-ocean', 'skin-purple', 'skin-midnight', 'skin-gold', 'skin-rose');
        if (skin !== 'default') {
            document.body.classList.add(`skin-${skin}`);
        }
        const skinNames = {
            default: 'Default Glass',
            cherry: 'Cherry Glass 🍒',
            ocean: 'Ocean Glass 🌊',
            purple: 'Purple Haze 💜',
            midnight: 'Midnight Blue 🌙',
            gold: 'Gold Edition 👑',
            rose: 'Rose Gold 🌸'
        };
        document.getElementById('currentSkinName').innerHTML = `текущий: ${skinNames[skin] || 'Default'}`;
    }

    function updateSkinShopUI() {
        document.querySelectorAll('.skin-btn').forEach(btn => {
            const skinId = btn.dataset.skin;
            const price = parseInt(btn.dataset.price);
            const isOwned = userData.ownedSkins.includes(skinId);
            const isActive = userData.currentSkin === skinId;
            
            btn.classList.remove('active', 'skin-locked');
            if (isActive) btn.classList.add('active');
            if (!isOwned && price > 0) {
                btn.classList.add('skin-locked');
                btn.style.position = 'relative';
            } else {
                btn.style.position = 'relative';
            }
            
            // Меняем поведение: если куплен — выбираем, если нет — покупаем
            btn.onclick = () => {
                if (isOwned) {
                    selectSkin(skinId);
                } else {
                    buySkin(skinId, price);
                }
            };
        });
    }

    // ========== ПОПОЛНЕНИЕ БАЛАНСА (DONATION ALERTS) ==========
    // Замените YOUR_DONATIONALERTS_URL на вашу ссылку
    const DONATION_URL = "https://www.donationalerts.com/r/ваша_ссылка";
    document.getElementById('donateLink').href = DONATION_URL;
    
    // Инструкция для пользователя
    function showDonateInstructions() {
        showToast(`💎 После доната напишите в комментарии: ${userId} и какой скин хотите`);
    }
    document.getElementById('donateLink').addEventListener('click', (e) => {
        e.preventDefault();
        showDonateInstructions();
        window.open(DONATION_URL, '_blank');
    });
    
    // Для тестирования (можно удалить потом) — добавляем баланс через консоль
    window.addBalance = function(amount) {
        userData.balance += amount;
        saveUserData();
        updateBalanceDisplay();
        showToast(`💰 Баланс пополнен на ${amount} руб`);
    };
    
    // Премиум код (даёт 100 рублей)
    window.addPremiumCode = function(code) {
        userData.balance += 100;
        saveUserData();
        updateBalanceDisplay();
        showToast(`✨ Премиум код активирован! +100 руб`);
    };

    // ========== ИГРОВАЯ ЛОГИКА ==========
    let truthQuestions = [
        { text: "Кто из присутствующих тебе нравится больше всего?", votes: 12 },
        { text: "Какую глупость ты совершал(а) ради лайков?", votes: 8 },
        { text: "Кому ты завидовал(а) в этой компании?", votes: 5 },
        { text: "Что бы ты изменил(а) в своей внешности?", votes: 15 },
        { text: "Какой самый дорогой подарок ты просил(а) у родителей?", votes: 3 },
        { text: "С кем из учителей ты хотел(а) бы подраться?", votes: 9 },
        { text: "Какую тайну ты никогда не расскажешь родителям?", votes: 20 },
        { text: "Кого из друзей ты считаешь самым красивым/красивой?", votes: 11 }
    ];
    
    let dareActions = [
        { text: "Сделай 10 отжиманий прямо сейчас", votes: 14 },
        { text: "Отправь смешное фото в общий чат", votes: 10 },
        { text: "Станцуй 10 секунд под любой трек", votes: 7 },
        { text: "Назови 3 своих недостатка", votes: 6 },
        { text: "Позвони маме и скажи 'я тебя люблю'", votes: 18 },
        { text: "Сделай комплимент человеку справа", votes: 9 },
        { text: "Покажи последнее фото в галерее", votes: 13 },
        { text: "Спой припев любимой песни", votes: 11 }
    ];
    
    let currentMode = "truth";
    let currentTask = null;
    
    function loadGameData() {
        const saved = localStorage.getItem(`liquid_rumors_${userId}`);
        if (saved) {
            try {
                const data = JSON.parse(saved);
                if (data.truthQuestions) truthQuestions = data.truthQuestions;
                if (data.dareActions) dareActions = data.dareActions;
            } catch(e) {}
        }
        updateRating();
    }
    
    function saveGameData() {
        localStorage.setItem(`liquid_rumors_${userId}`, JSON.stringify({
            truthQuestions: truthQuestions,
            dareActions: dareActions
        }));
    }
    
    function updateRating() {
        const ratingList = document.getElementById('ratingList');
        const allItems = [
            ...truthQuestions.map(q => ({ text: q.text, votes: q.votes, type: "truth" })),
            ...dareActions.map(d => ({ text: d.text, votes: d.votes, type: "dare" }))
        ];
        allItems.sort((a, b) => b.votes - a.votes);
        const top5 = allItems.slice(0, 5);
        
        if (top5.length === 0) {
            ratingList.innerHTML = '<div class="rating-item"><span style="color:rgba(255,255,255,0.3);">пока нет голосов</span></div>';
            return;
        }
        
        ratingList.innerHTML = top5.map(item => `
            <div class="rating-item">
                <span class="rating-text">${item.type === "truth" ? "🎤" : "⚡"} ${escapeHtml(item.text.length > 35 ? item.text.slice(0,35)+"..." : item.text)}</span>
                <span class="rating-votes">👍 ${item.votes}</span>
            </div>
        `).join('');
    }
    
    function voteForTask(taskText, isTruth) {
        if (isTruth) {
            const q = truthQuestions.find(t => t.text === taskText);
            if (q) q.votes++;
        } else {
            const d = dareActions.find(t => t.text === taskText);
            if (d) d.votes++;
        }
        saveGameData();
        updateRating();
    }
    
    function getRandomTask() {
        let list = currentMode === "truth" ? truthQuestions : dareActions;
        if (list.length === 0) return null;
        const randomIndex = Math.floor(Math.random() * list.length);
        return { ...list[randomIndex], isTruth: currentMode === "truth", index: randomIndex };
    }
    
    function displayTask(task) {
        if (!task) {
            document.getElementById('taskEmoji').textContent = "❌";
            document.getElementById('taskText').textContent = "Нет заданий! Добавьте свои";
            document.getElementById('taskCategory').textContent = "пусто";
            return;
        }
        currentTask = task;
        document.getElementById('taskEmoji').textContent = currentMode === "truth" ? "🎤" : "⚡";
        document.getElementById('taskText').textContent = task.text;
        document.getElementById('taskCategory').textContent = currentMode === "truth" ? "ПРАВДА • ответь честно" : "ДЕЙСТВИЕ • выполни сейчас";
    }
    
    function spin() {
        const task = getRandomTask();
        if (task) {
            displayTask(task);
            showToast(currentMode === "truth" ? "🎤 Вопрос выпал!" : "⚡ Действие выпало!");
        } else {
            showToast("Добавьте вопросы в игру!");
        }
    }
    
    function randomMode() {
        const modes = ["truth", "dare"];
        const newMode = modes[Math.floor(Math.random() * 2)];
        if (newMode === "truth") {
            document.getElementById('modeTruth').classList.add('active');
            document.getElementById('ModeDare').classList.remove('active');
            currentMode = "truth";
        } else {
            document.getElementById('ModeDare').classList.add('active');
            document.getElementById('modeTruth').classList.remove('active');
            currentMode = "dare";
        }
        spin();
        showToast(`🎲 Режим: ${currentMode === "truth" ? "Правда" : "Действие"}`);
    }
    
    function addCustomQuestion() {
        const input = document.getElementById('newQuestion');
        const text = input.value.trim();
        const type = document.getElementById('questionType').value;
        
        if (!text) {
            showToast("Напиши вопрос или действие!");
            return;
        }
        if (text.length > 150) {
            showToast("Слишком длинно, максимум 150 символов");
            return;
        }
        
        if (type === "truth") {
            truthQuestions.push({ text: text, votes: 0 });
            showToast("➕ Вопрос добавлен в 'Правда'!");
        } else {
            dareActions.push({ text: text, votes: 0 });
            showToast("➕ Действие добавлено в 'Действие'!");
        }
        
        input.value = "";
        saveGameData();
        updateRating();
    }
    
    function likeCurrentTask() {
        if (currentTask) {
            voteForTask(currentTask.text, currentTask.isTruth);
            showToast("👍 Спасибо за оценку!");
        } else {
            showToast("Сначала выбери задание");
        }
    }
    
    function showToast(msg) {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.style.display = 'block';
        setTimeout(() => {
            toast.style.display = 'none';
        }, 1800);
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    // ========== ИНИЦИАЛИЗАЦИЯ ==========
    function init() {
        loadUserData();
        loadGameData();
        
        document.getElementById('modeTruth').addEventListener('click', () => {
            document.getElementById('modeTruth').classList.add('active');
            document.getElementById('ModeDare').classList.remove('active');
            currentMode = "truth";
            spin();
        });
        
        document.getElementById('ModeDare').addEventListener('click', () => {
            document.getElementById('ModeDare').classList.add('active');
            document.getElementById('modeTruth').classList.remove('active');
            currentMode = "dare";
            spin();
        });
        
        document.getElementById('spinBtn').addEventListener('click', spin);
        document.getElementById('randomBtn').addEventListener('click', randomMode);
        document.getElementById('addBtn').addEventListener('click', addCustomQuestion);
        document.getElementById('taskCard').addEventListener('dblclick', likeCurrentTask);
        
        spin();
        
        console.log("🎮 Liquid Rumors запущен!");
        console.log("💎 Команды: addBalance(100) - добавить баланс, addPremiumCode('code') - премиум код");
    }
    
    init();
</script>
</body>
